function drawDarkBeast(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/8);
  const rage=dbRageActive||dbFrenzyActive||dbOverBeastActive;
  ctx.save();

  // Scale up during rage / over beast
  const sc=dbOverBeastActive?1.6:(dbRageActive?1.35:(dbFrenzyActive?1.5:1));
  ctx.translate(x,y);
  ctx.scale(sc,sc);
  ctx.translate(-x,-y);

  // === AURA KUAT — berlapis ===
  // Outer dark aura
  const auraR=size*(dbOverBeastActive?9:dbFrenzyActive?7:dbRageActive?5:4);
  const auraCols=dbOverBeastActive?['rgba(0,0,0,0.9)','rgba(20,0,0,0.7)','rgba(80,0,0,0.3)']:
                 dbFrenzyActive?['rgba(180,0,0,0.7)','rgba(80,0,0,0.4)','rgba(20,0,0,0.1)']:
                                ['rgba(0,0,0,0.8)','rgba(10,0,0,0.5)','rgba(0,0,0,0)'];
  const auraGrad=ctx.createRadialGradient(x,y,0,x,y,auraR);
  auraGrad.addColorStop(0,auraCols[0]);
  auraGrad.addColorStop(0.5,auraCols[1]);
  auraGrad.addColorStop(1,auraCols[2]);
  ctx.fillStyle=auraGrad;
  ctx.beginPath(); ctx.arc(x,y,auraR,0,Math.PI*2); ctx.fill();

  // Pulsing dark rings
  const nRings=dbOverBeastActive?4:2;
  for(let r=0;r<nRings;r++){
    const rr=size*(1.8+r*1.2+pulse*0.4);
    const alpha=dbOverBeastActive?(0.6-r*0.1+pulse*0.2):(0.3+pulse*0.2-r*0.08);
    ctx.strokeStyle=dbOverBeastActive?`rgba(0,0,0,${alpha})`:`rgba(60,0,0,${alpha})`;
    ctx.lineWidth=dbOverBeastActive?3:2;
    ctx.shadowColor=dbOverBeastActive?'#000':'#dc2626';
    ctx.shadowBlur=dbOverBeastActive?20:10;
    ctx.beginPath(); ctx.arc(x,y,rr,0,Math.PI*2); ctx.stroke();
  }

  // === BEAST BODY — hitam pekat ===
  const bodyGrad=ctx.createRadialGradient(x,y-size*0.2,size*0.1,x,y,size*1.3);
  if(dbOverBeastActive){
    bodyGrad.addColorStop(0,'rgba(5,0,0,1)');
    bodyGrad.addColorStop(0.4,'rgba(0,0,0,1)');
    bodyGrad.addColorStop(1,'rgba(0,0,0,0.95)');
  } else if(dbFrenzyActive){
    bodyGrad.addColorStop(0,'rgba(60,0,0,1)');
    bodyGrad.addColorStop(0.5,'rgba(20,0,0,0.95)');
    bodyGrad.addColorStop(1,'rgba(0,0,0,0.9)');
  } else {
    bodyGrad.addColorStop(0,'rgba(10,0,0,1)');
    bodyGrad.addColorStop(0.5,'rgba(0,0,0,1)');
    bodyGrad.addColorStop(1,'rgba(0,0,0,0.95)');
  }
  ctx.fillStyle=bodyGrad;
  ctx.shadowColor=dbOverBeastActive?'#000':(dbFrenzyActive?'#dc2626':'#000');
  ctx.shadowBlur=rage?25+pulse*15:12;

  // Main body ellipse
  ctx.beginPath();
  ctx.ellipse(x,y,size*0.9,size*1.1,0,0,Math.PI*2);
  ctx.fill();

  // === CLAWS — 4 dark claws hitam tajam ===
  const clawAngles=[-Math.PI*0.7, -Math.PI*0.3, Math.PI*0.3+0.1, Math.PI*0.7-0.1];
  clawAngles.forEach((ang,i)=>{
    const cx2=x+Math.cos(ang)*size*1.1;
    const cy2=y+Math.sin(ang)*size*1.0;
    ctx.fillStyle=dbOverBeastActive?'rgba(0,0,0,1)':(dbFrenzyActive?'rgba(40,0,0,0.95)':'rgba(5,0,0,0.95)');
    ctx.shadowColor=dbOverBeastActive?'#000':'#300000';
    ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.moveTo(cx2,cy2);
    const tipX=cx2+Math.cos(ang)*size*0.9;
    const tipY=cy2+Math.sin(ang)*size*0.9;
    ctx.lineTo(tipX-Math.cos(ang+Math.PI/2)*size*0.22, tipY-Math.sin(ang+Math.PI/2)*size*0.22);
    ctx.lineTo(tipX, tipY);
    ctx.lineTo(tipX+Math.cos(ang+Math.PI/2)*size*0.22, tipY+Math.sin(ang+Math.PI/2)*size*0.22);
    ctx.closePath();
    ctx.fill();
  });

  // === EYES — MERAH MENYALA ===
  const eyeY=y-size*0.25;
  const eyeOff=size*0.3;
  [x-eyeOff,x+eyeOff].forEach(ex=>{
    // Eye outer glow
    const eyeGlow=ctx.createRadialGradient(ex,eyeY,0,ex,eyeY,size*0.45);
    eyeGlow.addColorStop(0,dbOverBeastActive?'rgba(255,0,0,1)':'rgba(200,0,0,0.9)');
    eyeGlow.addColorStop(0.4,'rgba(150,0,0,0.6)');
    eyeGlow.addColorStop(1,'rgba(80,0,0,0)');
    ctx.fillStyle=eyeGlow;
    ctx.shadowColor='#ff0000';
    ctx.shadowBlur=dbOverBeastActive?30+pulse*20:15+pulse*10;
    ctx.beginPath(); ctx.arc(ex,eyeY,size*0.45,0,Math.PI*2); ctx.fill();
    // Eye core bright
    ctx.beginPath(); ctx.arc(ex,eyeY,size*0.2,0,Math.PI*2);
    ctx.fillStyle=dbOverBeastActive?'#ff0000':'#cc0000';
    ctx.fill();
    // Pupil slit vertikal
    ctx.fillStyle='rgba(0,0,0,0.95)';
    ctx.beginPath();
    ctx.ellipse(ex,eyeY,size*0.05,size*0.16,0,0,Math.PI*2);
    ctx.fill();
  });

  // Over Beast / Frenzy — teeth + efek chaos
  if(rage){
    const teethY=y+size*0.2;
    ctx.fillStyle=dbOverBeastActive?'rgba(220,0,0,0.95)':'rgba(255,255,255,0.9)';
    ctx.shadowColor=dbOverBeastActive?'#ff0000':'none';
    ctx.shadowBlur=dbOverBeastActive?10:0;
    for(let i=0;i<6;i++){
      const tx2=x-size*0.45+i*size*0.18;
      ctx.beginPath();
      ctx.moveTo(tx2,teethY);
      ctx.lineTo(tx2+size*0.07,teethY+size*0.26);
      ctx.lineTo(tx2+size*0.14,teethY);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Over Beast — extra dark lightning crackles around body
  if(dbOverBeastActive){
    ctx.shadowColor='#ff0000';
    ctx.shadowBlur=15;
    ctx.strokeStyle=`rgba(180,0,0,${0.4+pulse*0.4})`;
    ctx.lineWidth=1.5;
    for(let i=0;i<6;i++){
      const ang=frame/10+i*(Math.PI/3);
      const r1=size*1.1, r2=size*1.8;
      const mx2=x+Math.cos(ang)*r1, my2=y+Math.sin(ang)*r1;
      const endX=x+Math.cos(ang+0.3)*r2, endY=y+Math.sin(ang+0.3)*r2;
      ctx.beginPath(); ctx.moveTo(mx2,my2);
      ctx.lineTo(mx2+(Math.random()-0.5)*size*0.6, my2+(Math.random()-0.5)*size*0.6);
      ctx.lineTo(endX,endY); ctx.stroke();
    }
  }

  // Rage indicator ring
  if(dbRageActive){
    const rageAlpha=0.4+pulse*0.4;
    ctx.beginPath(); ctx.arc(x,y,size*1.7,0,Math.PI*2);
    ctx.strokeStyle=`rgba(120,0,0,${rageAlpha})`; ctx.lineWidth=3; ctx.stroke();
  }

  ctx.restore();
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.setLineDash([]);ctx.restore();
}

    }

  if(hakiHaoActive && hakiHaoRing>0){
    const alpha = Math.max(0, 0.7-hakiHaoRing/600);

      ctx.beginPath(); ctx.arc(x,y,Math.max(1,rOff),0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  ctx.globalAlpha=1; ctx.restore();
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.setLineDash([]);ctx.restore();
}

function drawPortalSkin(x,y,size){

  for(let i=portalParticles.length-1;i>=0;i--){
    const p=portalParticles[i];

    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color; ctx.shadowColor='#0ea5e9'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Efek shimmer saat Blink Storm
  if(portalBlinkActive){
    const shimmer=ctx.createRadialGradient(x,y,0,x,y,size*4.5);
    shimmer.addColorStop(0,'rgba(56,189,248,0.5)');
    shimmer.addColorStop(0.5,'rgba(14,165,233,0.2)');
    shimmer.addColorStop(1,'rgba(0,0,0,0)');

}

      const py2=y+Math.sin(prevA)*cr*0.7-size*0.1;
      ctx.beginPath(); ctx.moveTo(cx2,cy2); ctx.lineTo(px2,py2);
      ctx.strokeStyle=`rgba(168,85,247,${0.35+pulse*0.2})`; ctx.lineWidth=1; ctx.stroke();
    }
  }

  // Ghost revive green border
  if(swGhostReviveActive){
    ctx.beginPath(); ctx.arc(x,y,size*2,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,255,150,${0.5+pulse*0.4})`; ctx.lineWidth=3; ctx.stroke();
  }

  ctx.restore();
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.setLineDash([]);ctx.restore();
}


function drawShip(skin, x, y, size) {
  // Hard isolate - save then reset everything
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
  ctx.setLineDash([]);
  ctx.lineWidth = 1;
  // PERF: disable all shadows in skin when zoomed in (major lag source)
  const _origShadowBlur = CanvasRenderingContext2D.prototype.__lookupSetter__?.('shadowBlur');
  const _disableShadow = zoomLevel > 0.5;

  // These are needed by the body drawing code below
  const frame_local = frame; // alias so 'frame' works inside

  const COLOR={
    'default':'#67e8f9',red:'#f87171',green:'#4ade80',blue:'#60a5fa',
    violet:'#c084fc',crimson_violet:'#e05a9e',crimson_ocean:'#7b8cde',cyborg:'#38bdf8',golden:'#fbbf24',diamond:'#a5f3fc',
    dark_spirit:'#a855f7',insting:'#34d399',ego:'#c084fc',
    ultimate_ego:'#e879f9',baryon:'#fb923c',dragon:'#ef4444',
    thunder:'#ff2020',god_ramadhan:'#fde68a',
    phantom:'#a78bfa',samurai:'#e2e8f0',nebula:'#818cf8',crimson:'#fb7185',void_walker:'#6366f1',
    insting_v2:'#ffffff',
    thunder_gold:'#fbbf24',
    cosmic_eye:'#8b5cf6',
    chronos:'#38bdf8',
    nebula_deceiver:'#fbbf24',
    paper_plane:'#86efac',
    spirit_wraith:'#c084fc',
    dark_beast:'#dc2626',
    kamui:'#c026d3',
    oculus:'#e2e8f0',
    night_purple:'#a855f7',
    rinnegan_eye:'#7c3aed',
    true_rinnegan:'#a855f7'
  };

  // Night Purple: body gradient ungu malam
  if(skin==='night_purple'){

    ctx.shadowBlur=18+Math.sin(frame/10)*6;
  } else if(skin==='oculus'){
    const ocbg = ctx.createLinearGradient(x, y-size, x, y+size);
    ocbg.addColorStop(0,'#ffffff');
    ocbg.addColorStop(0.3,'#cbd5e1');
    ocbg.addColorStop(0.65,'#1e293b');
    ocbg.addColorStop(1,'#000000');
    ctx.fillStyle = ocbg;
    ctx.shadowColor = ocEvilEyeCharging ? '#ef4444' : '#e2e8f0';
    ctx.shadowBlur = ocEvilEyeCharging ? 30+Math.sin(frame/5)*10 : 15+Math.sin(frame/12)*5;
  } else if(skin==='sakura_phantom'){
    const spbg = ctx.createLinearGradient(x, y-size, x, y+size);
    spbg.addColorStop(0,'#fce7f3');
    spbg.addColorStop(0.3,'#f9a8d4');
    spbg.addColorStop(0.65,'#ec4899');
    spbg.addColorStop(1,'rgba(190,24,93,0.6)');
    ctx.fillStyle = spbg;
    ctx.shadowColor = '#f9a8d4';
    ctx.shadowBlur = 20+Math.sin(frame/12)*7;
    ctx.globalAlpha = 0.82+Math.sin(frame/20)*0.1; // sedikit transparan ghosting
  } else if(skin==='crimson_violet'){
    const cvbg = ctx.createLinearGradient(x-size,y-size,x+size,y+size);
    cvbg.addColorStop(0,'#fca5a5');
    cvbg.addColorStop(0.35,'#f43f5e');
    cvbg.addColorStop(0.65,'#a855f7');
    cvbg.addColorStop(1,'#6d28d9');
    ctx.fillStyle = cvbg;
    ctx.shadowColor = '#e05a9e';
    ctx.shadowBlur = 18+Math.sin(frame/10)*6;
  } else if(skin==='rainbow'){
    const g=ctx.createLinearGradient(x-size,y-size,x+size,y+size);
    const t=frame/30;
    g.addColorStop(0,`hsl(${t*60%360},100%,65%)`);
    g.addColorStop(0.33,`hsl(${(t*60+120)%360},100%,65%)`);
    g.addColorStop(0.66,`hsl(${(t*60+240)%360},100%,65%)`);

  } else if(skin==='thunder_gold'){
    // Legendary gold-electric gradient body

    tg.addColorStop(0.3,'#fbbf24');
    tg.addColorStop(0.7,'#d97706');
    tg.addColorStop(1,'#fde047');
    ctx.fillStyle=tg;
    ctx.shadowColor='#fbbf24';
    ctx.shadowBlur=30+Math.sin(frame/8)*10;
  } else if(skin==='insting_v2'){
    // Pure white gradient body
    const g2=ctx.createLinearGradient(x,y-size,x,y+size);
    g2.addColorStop(0,'#ffffff'); g2.addColorStop(0.5,'#e0f2fe'); g2.addColorStop(1,'#7dd3fc');
    ctx.fillStyle=g2;
  } else if(skin==='nebula_deceiver'){
    // Nebula Deceiver MYTHICAL — hitam emas, NO shadowBlur (performa mobile)
    if(ndPlayerHidden && (ndCloneActive || ndUltActive)){
      ctx.globalAlpha = 0.08;
    }
    const ndg=ctx.createLinearGradient(x,y-size*1.4,x,y+size*1.2);
    ndg.addColorStop(0,'#fffde7');
    ndg.addColorStop(0.12,'#ffd54f');
    ndg.addColorStop(0.3,'#f59e0b');
    ndg.addColorStop(0.5,'#b45309');
    ndg.addColorStop(0.72,'#1c0a00');
    ndg.addColorStop(0.88,'#000000');
    ndg.addColorStop(1,'#0a0000');
    ctx.fillStyle=ndg;
    ctx.shadowBlur=0;
  } else if(skin==='chronos'){
    // Chronos — gradient biru-ungu waktu
    const cg=ctx.createLinearGradient(x-size,y-size,x+size,y+size);
    cg.addColorStop(0,'#e0f2fe');
    cg.addColorStop(0.3,'#38bdf8');
    cg.addColorStop(0.7,'#6366f1');
    cg.addColorStop(1,'#a855f7');
    ctx.fillStyle=cg;
    ctx.shadowColor='#38bdf8';
    ctx.shadowBlur=25+Math.sin(frame/10)*8;
  } else if(skin==='kamui'){
    // Kamui — deep void purple-pink gradient, makin terang di dimensi
    const kg=ctx.createLinearGradient(x,y-size*1.3,x,y+size*1.1);
    if(kamuiDimActive){
      kg.addColorStop(0,'#fff0ff');
      kg.addColorStop(0.2,'#ff80ff');
      kg.addColorStop(0.55,'#cc00ff');
      kg.addColorStop(0.85,'#6600cc');
      kg.addColorStop(1,'#1a0033');
    } else {
      kg.addColorStop(0,'#f5d0ff');
      kg.addColorStop(0.25,'#d946ef');
      kg.addColorStop(0.6,'#8b00cc');
      kg.addColorStop(0.9,'#3b006b');
      kg.addColorStop(1,'#0d0018');
    }
    ctx.fillStyle=kg;
    ctx.shadowColor = kamuiDimActive ? '#ff80ff' : '#cc44ff';
    ctx.shadowBlur  = kamuiDimActive ? 40+Math.sin(frame/7)*14 : 22+Math.sin(frame/11)*7;
  } else if(skin==='ultimate_ego'){
    // LEGENDARY ULTIMATE EGO — ungu hitam mewah
    const pulse=0.5+0.5*Math.sin(frame/15);
    const ug=ctx.createLinearGradient(x-size,y-size*1.2,x+size,y+size*1.2);
    ug.addColorStop(0,'#ffffff');
    ug.addColorStop(0.15,`hsl(${285+frame%40},100%,80%)`);
    ug.addColorStop(0.4,'#a855f7');
    ug.addColorStop(0.7,'#4c1d95');
    ug.addColorStop(1,'#0a0010');
    ctx.fillStyle=ug;
    ctx.shadowColor=egoMode?'#e879f9':'#a855f7';
    ctx.shadowBlur=egoMode?(40+pulse*20):(20+pulse*10);
  } else if(skin==='esdeath'){
    const pulse=0.5+0.5*Math.sin(frame/10);
    const freeze=esMahaActive;

    ctx.save();
    ctx.shadowColor=freeze?'#ffffff':'#38bdf8';
    ctx.shadowBlur=freeze?60:25+pulse*15;

    // Body utama — gradien es kristal tajam
    const eg=ctx.createLinearGradient(x,y-size*1.2,x,y+size*0.8);
    eg.addColorStop(0,'#ffffff');
    eg.addColorStop(0.3,'#bae6fd');
    eg.addColorStop(0.7,'#38bdf8');
    eg.addColorStop(1,'#0369a1');
    ctx.fillStyle=eg;

    // Bentuk seperti talon/claw Esdeath — lancip dan elegan
    ctx.beginPath();
    ctx.moveTo(x, y-size*1.2);          // puncak atas
    ctx.lineTo(x+size*0.25, y-size*0.2);
    ctx.lineTo(x+size*1.3, y+size*0.3); // sayap kanan
    ctx.lineTo(x+size*0.5, y+size*0.1);
    ctx.lineTo(x+size*0.2, y+size*0.8); // ekor kanan
    ctx.lineTo(x, y+size*0.4);
    ctx.lineTo(x-size*0.2, y+size*0.8); // ekor kiri
    ctx.lineTo(x-size*0.5, y+size*0.1);
    ctx.lineTo(x-size*1.3, y+size*0.3); // sayap kiri
    ctx.lineTo(x-size*0.25, y-size*0.2);
    ctx.closePath();
    ctx.fill();

    // Garis tengah putih — tulang punggung
    ctx.strokeStyle=`rgba(255,255,255,${0.6+pulse*0.3})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(x, y-size*1.2);
    ctx.lineTo(x, y+size*0.4);
    ctx.stroke();

    // Kristal es di ujung sayap — 2 sisi
    [[-1,1],[1,1]].forEach(([sx])=>{
      const wx=x+sx*size*1.3, wy=y+size*0.3;
      const cg=ctx.createLinearGradient(wx,wy-10,wx,wy+14);
      cg.addColorStop(0,'rgba(255,255,255,0.9)');
      cg.addColorStop(1,'rgba(56,189,248,0.2)');
      ctx.fillStyle=cg;
      ctx.beginPath();
      ctx.moveTo(wx, wy-12);
      ctx.lineTo(wx+sx*5, wy+2);
      ctx.lineTo(wx, wy+14);
      ctx.lineTo(wx-sx*5, wy+2);
      ctx.closePath();
      ctx.fill();
    });

    // Mahapadma — aura ring besar berputar
    if(esMahaActive){
      for(let r=1;r<=3;r++){
        const rr=size*(1.8+r*0.7)+Math.sin(frame/6+r)*5;
        ctx.beginPath();
        ctx.arc(x,y,rr,0,Math.PI*2);
        ctx.strokeStyle=`rgba(${r===1?'255,255,255':r===2?'147,210,255':'56,189,248'},${(0.6-r*0.15)+pulse*0.2})`;
        ctx.lineWidth=r===1?3:2;
        ctx.stroke();
      }
    }
    // Weissschnabel ready — kilau kecil di ujung
    if(esWeissCD===0){
      ctx.fillStyle=`rgba(255,255,255,${0.4+pulse*0.5})`;
      ctx.beginPath();
      ctx.arc(x, y-size*1.2, 4+pulse*2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  } else if(skin==='ruby'){
    const pulse=0.5+0.5*Math.sin(frame/10);
    const rg=ctx.createLinearGradient(x-size,y-size,x+size,y+size);
    rg.addColorStop(0,'#fda4af');
    rg.addColorStop(0.5,'#fb7185');
    rg.addColorStop(1,'#be123c');
    ctx.fillStyle=rg;
    ctx.shadowColor='#fb7185';
    ctx.shadowBlur=rubyShieldActive?30+pulse*15:15+pulse*8;
    // Bentuk diamond/permata
    ctx.beginPath();
    ctx.moveTo(x, y-size);
    ctx.lineTo(x+size*0.8, y-size*0.2);
    ctx.lineTo(x+size*0.6, y+size*0.8);
    ctx.lineTo(x, y+size*0.5);
    ctx.lineTo(x-size*0.6, y+size*0.8);
    ctx.lineTo(x-size*0.8, y-size*0.2);
    ctx.closePath();
    ctx.fill();
    // Kilau permata
    ctx.fillStyle=`rgba(255,255,255,${0.3+pulse*0.3})`;
    ctx.beginPath();
    ctx.moveTo(x-size*0.2, y-size*0.7);
    ctx.lineTo(x+size*0.1, y-size*0.4);
    ctx.lineTo(x-size*0.3, y-size*0.1);
    ctx.closePath();
    ctx.fill();
  } else if(skin==='paper_plane'){
    // Warna berdasarkan form
    const formColors={plane:'#86efac',jet:'#fbbf24',shuriken:'#a5b4fc',ship:'#6ee7b7'};
    const fc=formColors[ppCurrentForm]||'#86efac';
    ctx.fillStyle=fc;
    ctx.shadowColor=fc;
    ctx.shadowBlur=ppShuriActive?20+Math.sin(frame/6)*10:12;
    // Gambar pesawat kertas (bentuk berbeda per form)
    ctx.beginPath();
    if(ppCurrentForm==='shuriken'){
      // Shuriken — bintang 4 sudut berputar
      const angle=frame*0.08;
      for(let i=0;i<4;i++){
        const a=angle+i*(Math.PI/2);
        ctx.lineTo(x+Math.cos(a)*size, y+Math.sin(a)*size*0.4);
        ctx.lineTo(x+Math.cos(a+Math.PI/4)*size*0.3, y+Math.sin(a+Math.PI/4)*size*0.3);
      }
    } else if(ppCurrentForm==='ship'){
      // Kapal — lebih lebar
      ctx.moveTo(x, y-size*0.8);
      ctx.lineTo(x+size*1.2, y+size*0.8);
      ctx.lineTo(x, y+size*0.3);
      ctx.lineTo(x-size*1.2, y+size*0.8);
    } else {
      // Plane / Jet — pesawat kertas segitiga lancip
      ctx.moveTo(x, y-size);
      ctx.lineTo(x+size*0.9, y+size*0.7);
      ctx.lineTo(x, y+size*0.2);
      ctx.lineTo(x-size*0.9, y+size*0.7);
    }
    ctx.closePath();
    ctx.fill();
    // Shuriken aura ring
    if(ppShuriActive){
      ctx.beginPath();
      ctx.arc(x,y,80,0,Math.PI*2);
      ctx.strokeStyle=`rgba(165,180,252,${0.3+0.2*Math.sin(frame/8)})`;
      ctx.lineWidth=2;
      ctx.stroke();
    }
  } else if(skin==='spirit_wraith'){
    ctx.fillStyle='rgba(192,132,252,0.9)';
    ctx.shadowColor='#a855f7';
    ctx.shadowBlur=20+Math.sin(frame/8)*8;
  } else if(skin==='samurai'){
    // Body armor perak baja — gradient dari putih ke abu gelap
    const pulse=0.5+0.5*Math.sin(frame/12);
    const smbg=ctx.createLinearGradient(x-size*0.8,y-size,x+size*0.8,y+size);
    smbg.addColorStop(0,'#f8fafc');
    smbg.addColorStop(0.2,'#e2e8f0');
    smbg.addColorStop(0.5,'#94a3b8');
    smbg.addColorStop(0.8,'#475569');
    smbg.addColorStop(1,'#1e293b');
    ctx.fillStyle=smbg;
    ctx.shadowColor=smSengokuActive?'#ef4444':'#e2e8f0';
    ctx.shadowBlur=smSengokuActive?(35+pulse*15):(18+pulse*7);
  } else if(skin==='rinnegan_eye'){
    // Body gelap ungu tua — awakening, belum full power
    const rnbg=ctx.createLinearGradient(x,y-size*1.2,x,y+size*1.0);
    rnbg.addColorStop(0,'#e9d5ff');
    rnbg.addColorStop(0.2,'#a855f7');
    rnbg.addColorStop(0.55,'#6d28d9');
    rnbg.addColorStop(0.8,'#3b0764');
    rnbg.addColorStop(1,'#0d0020');
    ctx.fillStyle=rnbg;
    ctx.shadowColor='#a855f7';
    ctx.shadowBlur=20+Math.sin(frame/12)*7;
  } else if(skin==='true_rinnegan'){
    // Body hitam pekat dengan shimmer biru-ungu — Rikudō Sennin
    const pulse=0.5+0.5*Math.sin(frame/12);
    const trbg=ctx.createLinearGradient(x,y-size*1.4,x,y+size*1.1);
    trbg.addColorStop(0,'#f0e6ff');
    trbg.addColorStop(0.15,`rgba(196,132,252,${0.95+pulse*0.05})`);
    trbg.addColorStop(0.35,'#7c3aed');
    trbg.addColorStop(0.55,'#1e0a40');
    trbg.addColorStop(0.75,'#050010');
    trbg.addColorStop(1,'#000000');
    ctx.fillStyle=trbg;
    ctx.shadowColor=trSixPathsActive?'#38bdf8':'#a855f7';
    ctx.shadowBlur=trSixPathsActive?(40+Math.sin(frame/7)*15):(28+Math.sin(frame/10)*10);
  } else if(skin==='dark_beast'){
    ctx.fillStyle='rgba(0,0,0,0.95)'; // hitam pekat
    ctx.shadowColor=dbOverBeastActive?'#ff0000':(dbFrenzyActive?'#800000':'#440000');
    ctx.shadowBlur=dbOverBeastActive?50+Math.sin(frame/4)*20:(dbFrenzyActive?35+Math.sin(frame/4)*15:20+Math.sin(frame/7)*8);
  } else {
    ctx.fillStyle=COLOR[skin]||'#67e8f9';
  }
  // Dark beast, nebula_deceiver, crimson_violet & sakura_phantom shadow sudah diset di atas — skip override
  if(skin!=='dark_beast' && skin!=='nebula_deceiver' && skin!=='crimson_violet' && skin!=='sakura_phantom' && skin!=='oculus' && skin!=='night_purple' && skin!=='rinnegan_eye' && skin!=='true_rinnegan' && skin!=='samurai'){
    ctx.shadowColor=COLOR[skin]||'#67e8f9';
    ctx.shadowBlur=skin==='insting_v2'?30:(egoMode?22:10);
  }

  // Main triangle ship — skip untuk skin yang punya body sendiri
  if(skin!=='baryon'&&skin!=='yuichiro'&&skin!=='dragon'&&skin!=='dragon_storm'&&skin!=='spirit_wraith'&&skin!=='dark_beast'&&skin!=='phoenix'){
    ctx.beginPath();
    ctx.moveTo(x, y-size);
    ctx.lineTo(x-size*0.75, y+size*0.8);
    ctx.lineTo(x, y+size*0.4);
    ctx.lineTo(x+size*0.75, y+size*0.8);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha=1; // reset setelah ghosting sakura
  }

  // === SAPPHIRE PHOENIX HIGH LEGENDARY FUSION — Custom Blue Bird Shape ===
  if(skin==='sapphire_phoenix'){
    drawSapphirePhoenix(x,y,size);
  }

  // === RAINBOW REFLEKS LEGENDARY FUSION — Prism Ship ===
  if(skin==='rainbow_refleks'){
    const pulse=0.5+0.5*Math.sin(frame/10);
    // Rotating rainbow aura
    ctx.save();
    RR_COLORS.forEach((c,ci)=>{
      const a=(ci/RR_COLORS.length)*Math.PI*2 + frame*0.04;
      const gx=x+Math.cos(a)*size*1.8, gy=y+Math.sin(a)*size*1.8;
      ctx.shadowColor=c; ctx.shadowBlur=18;
      ctx.fillStyle=c; ctx.globalAlpha=0.55+pulse*0.2;
      ctx.beginPath(); ctx.arc(gx,gy,size*0.35,0,Math.PI*2); ctx.fill();
    });
    // Main body — white-rainbow gradient
    const grad=ctx.createRadialGradient(x,y,0,x,y,size*1.1);
    grad.addColorStop(0,'#fff');
    grad.addColorStop(0.4,'#f0abfc');
    grad.addColorStop(0.8,'#60a5fa');
    grad.addColorStop(1,'rgba(96,165,250,0)');
    ctx.globalAlpha=0.95; ctx.shadowColor='#f0abfc'; ctx.shadowBlur=28;
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(x,y-size*1.3);
    ctx.lineTo(x-size*0.7,y+size*0.7);
    ctx.lineTo(x,y+size*0.3);
    ctx.lineTo(x+size*0.7,y+size*0.7);
    ctx.closePath(); ctx.fill();
    // Core gem
    ctx.fillStyle='#fff'; ctx.globalAlpha=0.9; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(x,y,size*0.35,0,Math.PI*2); ctx.fill();
    // Prism sparkles
    for(let sp=0;sp<4;sp++){
      const sa=(sp/4)*Math.PI*2+frame*0.08;
      const sx=x+Math.cos(sa)*size*0.6, sy=y+Math.sin(sa)*size*0.6;
      ctx.fillStyle=RR_COLORS[(sp+Math.floor(frame/8))%RR_COLORS.length];
      ctx.globalAlpha=0.7+pulse*0.2;
      ctx.beginPath(); ctx.arc(sx,sy,size*0.18,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // === PHOENIX HIGH LEGENDARY — Custom Bird Shape ===
  if(skin==='phoenix'){
    const pulse  = 0.5+0.5*Math.sin(frame/12);
    const pulse2 = 0.5+0.5*Math.sin(frame/8+1.5);
    const wingFlap = Math.sin(frame/8); // sayap mengepak

    // Outer fire aura
    const auraR = size*3.5+pulse*size*0.5;
    const ag = ctx.createRadialGradient(x,y,size*0.3,x,y,auraR);
    ag.addColorStop(0,`rgba(251,191,36,${0.35+pulse*0.2})`);
    ag.addColorStop(0.4,`rgba(249,115,22,${0.2+pulse2*0.15})`);
    ag.addColorStop(1,'rgba(239,68,68,0)');
    ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(x,y,auraR,0,Math.PI*2); ctx.fill();

    // === SAYAP KIRI ===
    const wingY = wingFlap * size * 0.4; // mengepak naik-turun
    ctx.save();
    const wgL = ctx.createLinearGradient(x, y, x-size*2.2, y-size*0.5+wingY);
    wgL.addColorStop(0,'#fbbf24'); wgL.addColorStop(0.5,'#f97316'); wgL.addColorStop(1,'rgba(239,68,68,0.3)');
    ctx.fillStyle=wgL; ctx.shadowColor='#f97316'; ctx.shadowBlur=18;
    ctx.beginPath();
    ctx.moveTo(x-size*0.3, y);

  // Skin-specific extras

    // Kanan
    ctx.save();
    const bladeGrR=ctx.createLinearGradient(x+size*0.5,y-size*0.2,x+size*1.3,y+size*0.3);
    bladeGrR.addColorStop(0,'#f8fafc'); bladeGrR.addColorStop(0.4,'#cbd5e1'); bladeGrR.addColorStop(1,'rgba(71,85,105,0.3)');
    ctx.fillStyle=bladeGrR; ctx.shadowColor='#e2e8f0'; ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.moveTo(x+size*0.5, y-size*0.1);
    ctx.lineTo(x+size*1.35,y-size*0.55);
    ctx.lineTo(x+size*1.15,y+size*0.25);
    ctx.lineTo(x+size*0.45,y+size*0.15);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=`rgba(255,255,255,${0.55+pulse*0.3})`; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(x+size*0.5,y-size*0.1); ctx.lineTo(x+size*1.35,y-size*0.55); ctx.stroke();
    ctx.restore();

    // -- GARIS BESI di tengah body (dou/cuirass) --
    ctx.strokeStyle=`rgba(241,245,249,${0.35+pulse*0.2})`; ctx.lineWidth=1;
    ctx.shadowColor='#fff'; ctx.shadowBlur=5;
    for(let li=0;li<3;li++){
      const ly=y-size*0.3+li*(size*0.35);
      const lw=size*(0.55-li*0.12);
      ctx.beginPath(); ctx.moveTo(x-lw,ly); ctx.lineTo(x+lw,ly); ctx.stroke();
    }

    // -- Engine bawah — putih perak --
    const engH=size*(0.65+pulse*0.18);
    const engG=ctx.createLinearGradient(x,y+size*0.4,x,y+size*0.4+engH);
    engG.addColorStop(0,smSengokuActive?'rgba(239,68,68,0.7)':'rgba(226,232,240,0.65)');
    engG.addColorStop(0.5,'rgba(148,163,184,0.25)');
    engG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=engG;
    ctx.shadowColor=smSengokuActive?'#ef4444':'#e2e8f0'; ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(x-size*0.22,y+size*0.42); ctx.lineTo(x+size*0.22,y+size*0.42);
    ctx.lineTo(x+size*0.08,y+size*0.42+engH); ctx.lineTo(x-size*0.08,y+size*0.42+engH);
    ctx.closePath(); ctx.fill();

    ctx.restore();
  }
  // === RINNEGAN EYE EXTRAS — 2 mata rinnegan + ring pattern + engine ===
  if(skin==='rinnegan_eye'){
    const pulse  = 0.5+0.5*Math.sin(frame/14);
    const pulse2 = 0.5+0.5*Math.sin(frame/9+1.2);
    ctx.save();

    // -- Outline kapal ungu gelap berdenyut --
    ctx.strokeStyle=`rgba(168,85,247,${0.4+pulse*0.3})`;
    ctx.lineWidth=1.8; ctx.shadowColor='#7c3aed'; ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(x,y-size); ctx.lineTo(x-size*0.75,y+size*0.8);
    ctx.lineTo(x,y+size*0.4); ctx.lineTo(x+size*0.75,y+size*0.8);
    ctx.closePath(); ctx.stroke();

    // ── FUNGSI GAMBAR 1 MATA RINNEGAN ──
    function drawRinneganEye(ex, ey, er, alpha, x, y, size){
      // === Putih mata (sclera) ===
      ctx.globalAlpha = alpha;
      ctx.fillStyle=`rgba(220,180,255,0.88)`;
      ctx.shadowColor='#a855f7'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.ellipse(ex, ey, er, er*0.72, 0, 0, Math.PI*2); ctx.fill();

      // === Iris — UNGU RINNEGAN ===
      const irisR = er*0.68;
      const irisGr = ctx.createRadialGradient(ex,ey,0,ex,ey,irisR);
      irisGr.addColorStop(0,   `rgba(100,20,180,${0.92+pulse*0.06})`);
      irisGr.addColorStop(0.35,`rgba(126,34,206,${0.88})`);
      irisGr.addColorStop(0.7, `rgba(88,28,135,${0.90})`);
      irisGr.addColorStop(1,   `rgba(46,16,101,${0.95})`);
      ctx.fillStyle=irisGr;
      ctx.shadowColor='#7c3aed'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(ex,ey,irisR,irisR*0.72,0,0,Math.PI*2); ctx.fill();

      // === RING PATTERN RINNEGAN — 3 ring konsentris ===
      const ringAngles = frame/45; // berputar pelan
      [0.52, 0.72, 0.90].forEach((rFrac, ri)=>{
        const rr = irisR * rFrac;
        // Ring line
        ctx.strokeStyle = `rgba(${200+ri*15},${140-ri*20},255,${0.30+pulse*0.18})`;
        ctx.lineWidth = 0.8;
        ctx.shadowColor = '#c084fc'; ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.ellipse(ex,ey,rr,rr*0.72,0,0,Math.PI*2); ctx.stroke();
        // Titik-titik di setiap ring — makin banyak di ring luar
        const dotCount = [6, 8, 12][ri];
        for(let d=0;d<dotCount;d++){
          const da = ringAngles*(ri%2===0?1:-1) + (d/dotCount)*Math.PI*2;
          const dx = ex + Math.cos(da)*rr;
          const dy = ey + Math.sin(da)*rr*0.72;
          ctx.fillStyle=`rgba(216,180,254,${0.55+pulse2*0.25})`;
          ctx.shadowColor='#e9d5ff'; ctx.shadowBlur=3;
          ctx.beginPath(); ctx.arc(dx,dy,0.9,0,Math.PI*2); ctx.fill();
        }
      });

      // === Pupil hitam bulat di tengah ===
      const pupilR = irisR*0.26;
      const pupilGr = ctx.createRadialGradient(ex,ey,0,ex,ey,pupilR);
      pupilGr.addColorStop(0,'rgba(0,0,0,1)');
      pupilGr.addColorStop(0.7,'rgba(10,0,20,0.95)');
      pupilGr.addColorStop(1,'rgba(30,0,60,0.8)');
      ctx.fillStyle=pupilGr;
      ctx.shadowColor= rnChibakuActive ? '#a855f7' : '#000';
      ctx.shadowBlur= rnChibakuActive ? 10+pulse*5 : 3;
      ctx.beginPath(); ctx.ellipse(ex,ey,pupilR,pupilR*0.72,0,0,Math.PI*2); ctx.fill();

      // === Highlight putih kecil — bikin keliatan "hidup" ===
      ctx.fillStyle=`rgba(255,255,255,${0.7+pulse*0.15})`;
      ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(ex-er*0.18,ey-er*0.18,er*0.09,0,Math.PI*2); ctx.fill();

      ctx.globalAlpha=1;
    }

    // ── MATA KIRI (lebih besar, posisi kiri atas kapal) ──
    const eyeLX = x - size*0.38;
    const eyeLY = y - size*0.82;
    const eyeLR = size*0.38;
    drawRinneganEye(eyeLX, eyeLY, eyeLR, 0.97, x, y, size);

    // ── MATA KANAN (sedikit lebih kecil, posisi kanan atas kapal) ──
    const eyeRX = x + size*0.38;
    const eyeRY = y - size*0.82;
    const eyeRR = size*0.38;
    drawRinneganEye(eyeRX, eyeRY, eyeRR, 0.97, x, y, size);

    // ── Glow di antara 2 mata saat Shinra aktif ──
    if(rnShinraActive && rnShinraWave < 80){
      const midX=(eyeLX+eyeRX)/2, midY=(eyeLY+eyeRY)/2;
      ctx.strokeStyle=`rgba(216,180,254,${Math.max(0,0.8-rnShinraWave/80)})`;
      ctx.lineWidth=1.5; ctx.shadowColor='#e9d5ff'; ctx.shadowBlur=12;
      ctx.setLineDash([2,3]);
      ctx.beginPath(); ctx.moveTo(eyeLX+eyeLR,eyeLY); ctx.lineTo(eyeRX-eyeRR,eyeRY); ctx.stroke();
      ctx.setLineDash([]);
    }

    // ── Chibaku Tensei — kedua mata bersinar intense ──
    if(rnChibakuActive){
      const cPulse=0.5+0.5*Math.sin(frame/5);
      [eyeLX,eyeRX].forEach(ex=>{
        const cRing=ctx.createRadialGradient(ex,eyeLY,0,ex,eyeLY,size*0.65);
        cRing.addColorStop(0,`rgba(168,85,247,${0.35+cPulse*0.2})`);
        cRing.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=cRing; ctx.beginPath(); ctx.arc(ex,eyeLY,size*0.65,0,Math.PI*2); ctx.fill();
      });
    }

    // ── Tanda di hidung / tengah kapal — segitiga rune kecil ──
    ctx.strokeStyle=`rgba(192,132,252,${0.35+pulse*0.25})`;
    ctx.lineWidth=1.2; ctx.shadowColor='#c084fc'; ctx.shadowBlur=6;
    ctx.beginPath();
    ctx.moveTo(x, y-size*0.4);
    ctx.lineTo(x-size*0.12, y-size*0.1);
    ctx.lineTo(x+size*0.12, y-size*0.1);
    ctx.closePath(); ctx.stroke();

    // ── Engine glow bawah — ungu gelap ──
    const engH=size*(0.65+pulse*0.18);
    const engG=ctx.createLinearGradient(x,y+size*0.4,x,y+size*0.4+engH);
    engG.addColorStop(0,'rgba(126,34,206,0.65)');
    engG.addColorStop(0.5,'rgba(88,28,135,0.25)');
    engG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=engG; ctx.shadowColor='#7c3aed'; ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.moveTo(x-size*0.22,y+size*0.42); ctx.lineTo(x+size*0.22,y+size*0.42);
    ctx.lineTo(x+size*0.08,y+size*0.42+engH); ctx.lineTo(x-size*0.08,y+size*0.42+engH);
    ctx.closePath(); ctx.fill();

    ctx.restore();
  }

  // ══════════════════════════════════════
  // 👁️‍🗨️ TRUE RINNEGAN — 6 MATA RIKUDŌ SENNIN
  // ══════════════════════════════════════
  if(skin==='true_rinnegan'){
    const pulse  = 0.5+0.5*Math.sin(frame/12);
    const pulse2 = 0.5+0.5*Math.sin(frame/8+1.2);
    const pulse3 = 0.5+0.5*Math.sin(frame/6+2.5);
    ctx.save();

    // -- Outline kapal — hitam dengan shimmer ungu-biru bergantian --
    const outlineColor=trSixPathsActive
      ?`rgba(56,189,248,${0.6+pulse*0.35})`
      :`rgba(${Math.floor(168+pulse3*40)},${Math.floor(85+pulse*30)},247,${0.5+pulse*0.3})`;
    ctx.strokeStyle=outlineColor;
    ctx.lineWidth=2.2; ctx.shadowColor=trSixPathsActive?'#38bdf8':'#a855f7'; ctx.shadowBlur=14;
    ctx.beginPath();
    ctx.moveTo(x,y-size); ctx.lineTo(x-size*0.75,y+size*0.8);
    ctx.lineTo(x,y+size*0.4); ctx.lineTo(x+size*0.75,y+size*0.8);
    ctx.closePath(); ctx.stroke();

    // -- Fungsi gambar 1 mata Rinnegan SEMPURNA --
    function drawTrueRinneganEye(ex, ey, er, alpha, isThirdEye, x, y, size){
      ctx.globalAlpha=alpha;

      // Sclera (putih mata) — lebih terang dari versi biasa
      ctx.fillStyle=isThirdEye?`rgba(200,230,255,0.95)`:`rgba(230,200,255,0.92)`;
      ctx.shadowColor=isThirdEye?'#38bdf8':'#c084fc'; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.ellipse(ex,ey,er,er*0.72,0,0,Math.PI*2); ctx.fill();

      // Iris — ungu sempurna dengan hint biru Rikudō
      const irisR=er*0.70;
      const irisGr=ctx.createRadialGradient(ex,ey,0,ex,ey,irisR);
      if(isThirdEye){
        // Mata ketiga — biru Rikudō
        irisGr.addColorStop(0,  `rgba(14,165,233,${0.95+pulse3*0.05})`);
        irisGr.addColorStop(0.4,`rgba(56,189,248,0.88)`);
        irisGr.addColorStop(0.75,`rgba(2,132,199,0.92)`);
        irisGr.addColorStop(1,  `rgba(7,89,133,0.97)`);
        ctx.shadowColor='#38bdf8'; ctx.shadowBlur=10;
      } else {
        // Mata biasa — ungu Rinnegan sempurna
        irisGr.addColorStop(0,  `rgba(120,30,200,${0.95+pulse*0.05})`);
        irisGr.addColorStop(0.35,`rgba(147,51,234,0.90)`);
        irisGr.addColorStop(0.7,`rgba(109,40,217,0.93)`);
        irisGr.addColorStop(1,  `rgba(60,10,120,0.97)`);
        ctx.shadowColor='#7c3aed'; ctx.shadowBlur=8;
      }
      ctx.fillStyle=irisGr;
      ctx.beginPath(); ctx.ellipse(ex,ey,irisR,irisR*0.72,0,0,Math.PI*2); ctx.fill();

      // Ring pattern Rinnegan — 3 ring konsentris LEBIH JELAS
      const ringRot=frame/35;
      [0.50,0.70,0.90].forEach((rFrac,ri)=>{
        const rr=irisR*rFrac;
        const ringAlpha=isThirdEye?0.45+pulse3*0.2:0.38+pulse*0.2;
        ctx.strokeStyle=isThirdEye
          ?`rgba(125,211,252,${ringAlpha-ri*0.06})`
          :`rgba(${210+ri*12},${140-ri*25},255,${ringAlpha-ri*0.05})`;
        ctx.lineWidth=0.9; ctx.shadowColor=isThirdEye?'#7dd3fc':'#c084fc'; ctx.shadowBlur=5;
        ctx.beginPath(); ctx.ellipse(ex,ey,rr,rr*0.72,0,0,Math.PI*2); ctx.stroke();

        // Titik-titik di ring — LEBIH BANYAK dari rinnegan biasa
        const dotCount=[8,10,14][ri];
        for(let d=0;d<dotCount;d++){
          const da=ringRot*(ri%2===0?1:-1)+(d/dotCount)*Math.PI*2;
          const dx=ex+Math.cos(da)*rr;
          const dy=ey+Math.sin(da)*rr*0.72;
          ctx.fillStyle=isThirdEye
            ?`rgba(186,230,253,${0.65+pulse3*0.25})`
            :`rgba(233,213,255,${0.65+pulse2*0.25})`;
          ctx.shadowColor=isThirdEye?'#bae6fd':'#f3e8ff'; ctx.shadowBlur=3;
          ctx.beginPath(); ctx.arc(dx,dy,0.85,0,Math.PI*2); ctx.fill();
        }
      });

      // Pupil hitam pekat
      const pupilR=irisR*0.24;
      const pupilGr=ctx.createRadialGradient(ex,ey,0,ex,ey,pupilR);
      pupilGr.addColorStop(0,'rgba(0,0,0,1)');
      pupilGr.addColorStop(0.65,'rgba(5,0,15,0.97)');
      pupilGr.addColorStop(1,isThirdEye?'rgba(0,20,40,0.85)':'rgba(20,0,50,0.82)');
      ctx.fillStyle=pupilGr;
      ctx.shadowColor='#000'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.ellipse(ex,ey,pupilR,pupilR*0.72,0,0,Math.PI*2); ctx.fill();

      // Highlight putih kecil
      ctx.fillStyle=`rgba(255,255,255,${0.75+pulse*0.15})`;
      ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(ex-er*0.15,ey-er*0.16,er*0.08,0,Math.PI*2); ctx.fill();

      // Saat skill aktif — mata berkilau lebih terang
      if((trShinraActive||trSixPathsActive) && !isThirdEye){
        ctx.strokeStyle=`rgba(216,180,254,${0.6+pulse*0.3})`;
        ctx.lineWidth=1; ctx.shadowColor='#e9d5ff'; ctx.shadowBlur=15;
        ctx.beginPath(); ctx.ellipse(ex,ey,er*1.15,er*0.85,0,0,Math.PI*2); ctx.stroke();
      }

      ctx.globalAlpha=1;
    }

    // ── 6 MATA: 2 baris × 3 mata ──
    // Baris atas: 3 mata (kiri, tengah, kanan)
    const eyeSize = size*0.28;
    const rowTopY  = y - size*0.80;
    const rowBotY  = y - size*0.35;
    const eyeSpacing = size*0.48;

    // Baris atas
    drawTrueRinneganEye(x - eyeSpacing, rowTopY, eyeSize, 0.97, false, x, y, size); // mata kiri
    drawTrueRinneganEye(x,              rowTopY, eyeSize*1.12, 0.98, true, x, y, size);  // mata tengah
    drawTrueRinneganEye(x + eyeSpacing, rowTopY, eyeSize, 0.97, false, x, y, size); // mata kanan

    // Baris bawah — sedikit lebih kecil
    drawTrueRinneganEye(x - eyeSpacing*0.7, rowBotY, eyeSize*0.78, 0.88, false, x, y, size);
    drawTrueRinneganEye(x,                  rowBotY, eyeSize*0.78, 0.88, false, x, y, size);
    drawTrueRinneganEye(x + eyeSpacing*0.7, rowBotY, eyeSize*0.78, 0.88, false, x, y, size);

    // ── Garis koneksi antar mata saat Six Paths aktif ──
    if(trSixPathsActive){
      const eyePositions=[
        [x-eyeSpacing,rowTopY],[x,rowTopY],[x+eyeSpacing,rowTopY],
        [x-eyeSpacing*0.7,rowBotY],[x,rowBotY],[x+eyeSpacing*0.7,rowBotY]
      ];
      ctx.strokeStyle=`rgba(56,189,248,${0.3+pulse*0.2})`;
      ctx.lineWidth=0.8; ctx.setLineDash([2,4]);
      ctx.shadowColor='#38bdf8'; ctx.shadowBlur=8;
      // Hubungkan tiap mata ke mata tengah baris atas
      eyePositions.forEach(([ex,ey],i)=>{
        if(i===1) return; // skip mata tengah sendiri
        ctx.beginPath(); ctx.moveTo(x,rowTopY); ctx.lineTo(ex,ey); ctx.stroke();
      });
      ctx.setLineDash([]);
    }

    // ── Rune segitiga di tengah — tanda Rikudō ──
    ctx.strokeStyle=`rgba(196,132,252,${0.45+pulse*0.3})`;
    ctx.lineWidth=1.3; ctx.shadowColor='#c084fc'; ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.moveTo(x, y-size*0.1);
    ctx.lineTo(x-size*0.14, y+size*0.15);
    ctx.lineTo(x+size*0.14, y+size*0.15);
    ctx.closePath(); ctx.stroke();

    // Dot di tengah segitiga
    ctx.fillStyle=`rgba(168,85,247,${0.6+pulse*0.3})`;
    ctx.shadowColor='#a855f7'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(x, y+size*0.07, size*0.06, 0, Math.PI*2); ctx.fill();

    // ── Engine glow bawah — biru-ungu Rikudō ──
    const engH=size*(0.8+pulse*0.25);
    const engG=ctx.createLinearGradient(x,y+size*0.4,x,y+size*0.4+engH);
    engG.addColorStop(0,trSixPathsActive?'rgba(56,189,248,0.75)':'rgba(139,92,246,0.70)');
    engG.addColorStop(0.4,trSixPathsActive?'rgba(14,165,233,0.30)':'rgba(88,28,135,0.28)');
    engG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=engG;
    ctx.shadowColor=trSixPathsActive?'#38bdf8':'#6d28d9'; ctx.shadowBlur=16;
    ctx.beginPath();
    ctx.moveTo(x-size*0.25,y+size*0.42); ctx.lineTo(x+size*0.25,y+size*0.42);
    ctx.lineTo(x+size*0.09,y+size*0.42+engH); ctx.lineTo(x-size*0.09,y+size*0.42+engH);
    ctx.closePath(); ctx.fill();

    // ── Wings kecil — lambang Rikudō ──
    const wingPulse=Math.sin(frame/15)*size*0.08;
    [[-1,1],[1,-1]].forEach(([dir,sign])=>{
      const wg=ctx.createLinearGradient(x,y,x+dir*size*1.6,y-size*0.3);
      wg.addColorStop(0,`rgba(139,92,246,${0.55+pulse*0.2})`);
      wg.addColorStop(0.6,`rgba(109,40,217,0.25)`);
      wg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=wg; ctx.shadowColor='#7c3aed'; ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.moveTo(x+dir*size*0.35, y-size*0.1);
      ctx.quadraticCurveTo(x+dir*size*1.1, y-size*0.5+wingPulse, x+dir*size*1.6, y-size*0.25+wingPulse);
      ctx.quadraticCurveTo(x+dir*size*1.0, y+size*0.15, x+dir*size*0.5, y+size*0.3);
      ctx.closePath(); ctx.fill();
    });

    ctx.restore();
  }
  if(skin==='sakura_phantom'){
    const pulse = 0.5+0.5*Math.sin(frame/12);
    ctx.strokeStyle=`rgba(236,72,153,${0.45+pulse*0.3})`;
    ctx.lineWidth=1.8; ctx.shadowColor='#ec4899'; ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(x, y-size); ctx.lineTo(x-size*0.75, y+size*0.8);
    ctx.lineTo(x, y+size*0.4); ctx.lineTo(x+size*0.75, y+size*0.8);
    ctx.closePath(); ctx.stroke();

    // -- BUNGA SAKURA di ujung atas kapal --
    const flowerX = x, flowerY = y-size*1.3;
    const petalCount = 5;
    const petalR = size*0.28;
    const petalDist = size*0.22;
    const flowerRot = frame/40; // berputar pelan
    for(let p=0; p<petalCount; p++){
      const pa = flowerRot + (p/petalCount)*Math.PI*2;
      const px = flowerX + Math.cos(pa)*petalDist;
      const py = flowerY + Math.sin(pa)*petalDist;
      const petalCol = p%2===0 ? `rgba(249,168,212,${0.85+pulse*0.15})` : `rgba(253,164,175,${0.75+pulse*0.15})`;
      ctx.fillStyle=petalCol; ctx.shadowColor='#f9a8d4'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(px, py, petalR, petalR*0.55, pa, 0, Math.PI*2); ctx.fill();
    }
    // Putik kuning di tengah bunga
    ctx.fillStyle=`rgba(253,224,71,${0.9+pulse*0.1})`;
    ctx.shadowColor='#fde047'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(flowerX, flowerY, size*0.13, 0, Math.PI*2); ctx.fill();

    // -- 3 kelopak orbit berputar --
    const orbitR = size*1.5;
    const orbitSpeed = frame/25;
    for(let o=0; o<3; o++){
      const oa = orbitSpeed + (o/3)*Math.PI*2;
      const ox = x + Math.cos(oa)*orbitR;
      const oy = y + Math.sin(oa)*orbitR;
      ctx.fillStyle=`rgba(249,168,212,${0.6+pulse*0.25})`;
      ctx.shadowColor='#ec4899'; ctx.shadowBlur=6;
      ctx.save();
      ctx.translate(ox, oy); ctx.rotate(oa+Math.PI/4);

    ctx.shadowBlur=0;
    const exLen2=size*(0.9+ndP*0.4);
    const exG=ctx.createLinearGradient(x,y+size*0.4,x,y+size*0.4+exLen2*2);
    exG.addColorStop(0,`rgba(251,191,36,${0.5+ndP*0.18})`);
    exG.addColorStop(0.3,'rgba(80,30,0,0.3)');
    exG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=exG;
    ctx.beginPath();
    ctx.moveTo(x-size*0.2, y+size*0.4);
    ctx.quadraticCurveTo(x-size*0.45,y+size*0.4+exLen2,x,y+size*0.4+exLen2*2);
    ctx.quadraticCurveTo(x+size*0.45,y+size*0.4+exLen2,x+size*0.2,y+size*0.4);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // === Partikel acak (tiap 4 frame agar lebih ringan) ===
    if(frame%4===0){
      const pang=Math.random()*Math.PI*2;
      const pdist=size*(1.4+Math.random()*1.0);
      particles.push({x:x+Math.cos(pang)*pdist,y:y+Math.sin(pang)*pdist,
        vx:(Math.random()-0.5)*1.0,vy:-0.4-Math.random()*1.2,
        r:1.5+Math.random()*1.8,life:30,maxLife:30,
        color:Math.random()<0.6?'rgba(251,191,36,0.85)':'rgba(10,5,0,0.9)'});
    }
  }

  // === COSMIC EYE LEGENDARY ===
  if(skin==='cosmic_eye'){
    const pulse=0.5+0.5*Math.sin(frame/12);
    const pulse2=0.5+0.5*Math.sin(frame/8+1);
    // Outer cosmic aura
    const cg=ctx.createRadialGradient(x,y,size*0.3,x,y,size*4);
    cg.addColorStop(0,`rgba(139,92,246,${0.4*pulse})`);
    cg.addColorStop(0.4,`rgba(99,102,241,${0.2*pulse})`);
    cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(x,y,size*4,0,Math.PI*2); ctx.fill();
    // Rotating cosmic rings
    for(let ri=0;ri<3;ri++){
      const ra=(ri/3)*Math.PI*2+frame/(40+ri*10);
      ctx.save();
      ctx.translate(x,y); ctx.rotate(ra);
      ctx.strokeStyle=`rgba(${ri===0?'167,139,250':ri===1?'99,102,241':'196,181,253'},${0.3+pulse*0.3})`;
      ctx.lineWidth=1.5; ctx.shadowColor='#8b5cf6'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(0,0,size*2.2+ri*6,size*1.1+ri*3,0,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    // Center eye pupil on body
    ctx.save();
    ctx.fillStyle='#1e1b4b'; ctx.shadowColor='#8b5cf6'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.ellipse(x,y-2,size*0.45,size*0.6,0,0,Math.PI*2); ctx.fill();
    // Iris
    const ig=ctx.createRadialGradient(x,y-2,0,x,y-2,size*0.45);
    ig.addColorStop(0,'#a855f7'); ig.addColorStop(0.5,'#6d28d9'); ig.addColorStop(1,'#1e1b4b');
    ctx.fillStyle=ig; ctx.beginPath(); ctx.ellipse(x,y-2,size*0.4,size*0.55,0,0,Math.PI*2); ctx.fill();
    // Pupil glow
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(x,y-2,size*0.2,size*0.28,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(167,139,250,${0.8+pulse*0.2})`; ctx.shadowColor='#a855f7'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(x,y-2,size*0.1,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // Orbiting void sparks
    for(let k=0;k<6;k++){
      const ka=(k/6)*Math.PI*2+frame/22;
      const kr=size*2.5+Math.sin(frame/10+k)*5;
      const alpha=0.4+0.5*Math.sin(frame/7+k*1.1);
      ctx.fillStyle=`rgba(167,139,250,${alpha})`; ctx.shadowColor='#a855f7'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(x+Math.cos(ka)*kr,y+Math.sin(ka)*kr,2.5,0,Math.PI*2); ctx.fill();
    }
    // Void Shift: highlight selectable meteors
    if(ceVoidShiftActive){
      ceVoidTargets.forEach((vt,vi)=>{
        if(!meteors.includes(vt.meteor)) return;
        const m=vt.meteor;
        const selectColor= vt.selected ? '#a855f7' : 'rgba(167,139,250,0.6)';
        ctx.save();
        ctx.strokeStyle=selectColor; ctx.lineWidth=3; ctx.shadowColor='#8b5cf6'; ctx.shadowBlur=15;
        ctx.setLineDash([4,4]); ctx.beginPath(); ctx.arc(m.x,m.y,m.size+8,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
        if(vt.selected){
          ctx.strokeStyle='rgba(167,139,250,0.5)'; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(m.x,m.y); ctx.stroke();
        }
        ctx.restore();
      });
      // Timer bar
      const pct=ceVoidShiftTimer/(35*60);
      ctx.save(); ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(x-45,y-size-22,90,7);
      ctx.fillStyle='#8b5cf6'; ctx.fillRect(x-45,y-size-22,90*pct,7); ctx.restore();
    }
    // Summoned skins
    if(ceSummonActive && ceSummonedSkins.length){
      ceSummonedSkins.forEach((ss,si)=>{
        drawSummonedSkin(ss, si);
      });
    }
  }

  // === THUNDER GOLD LEGENDARY ===
  if(skin==='thunder_gold'){
    // Golden lightning bolt corak pada badan
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.shadowColor='#fff7c0'; ctx.shadowBlur=12;
    // Bolt kiri
    ctx.beginPath(); ctx.moveTo(x-4,y-size*0.7); ctx.lineTo(x-9,y-size*0.1); ctx.lineTo(x-5,y-size*0.1); ctx.lineTo(x-8,y+size*0.5); ctx.lineTo(x-1,y-size*0.1); ctx.lineTo(x-5,y-size*0.1); ctx.lineTo(x-4,y-size*0.7); ctx.closePath(); ctx.fill();
    // Bolt kanan
    ctx.beginPath(); ctx.moveTo(x+4,y-size*0.7); ctx.lineTo(x+9,y-size*0.1); ctx.lineTo(x+5,y-size*0.1); ctx.lineTo(x+8,y+size*0.5); ctx.lineTo(x+1,y-size*0.1); ctx.lineTo(x+5,y-size*0.1); ctx.lineTo(x+4,y-size*0.7); ctx.closePath(); ctx.fill();
    // Golden aura ring
    const pulse=0.5+0.5*Math.sin(frame/10);
    const gr=ctx.createRadialGradient(x,y,size*0.5,x,y,size*3.5);
    gr.addColorStop(0,`rgba(251,191,36,${0.35*pulse})`);
    gr.addColorStop(0.5,`rgba(217,119,6,${0.2*pulse})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3.5,0,Math.PI*2); ctx.fill();
    // Electric sparks orbit
    for(let k=0;k<8;k++){
      const a=(k/8)*Math.PI*2+frame/18;
      const r=size*2+Math.sin(frame/6+k)*4;
      const alpha=0.5+0.5*Math.sin(frame/5+k*0.7);
      ctx.fillStyle=`rgba(253,224,71,${alpha})`;
      ctx.shadowColor='#fde047'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(x+Math.cos(a)*r,y+Math.sin(a)*r,2.5,0,Math.PI*2); ctx.fill();
    }
    // Crown di atas
    ctx.fillStyle='#fbbf24'; ctx.shadowColor='#fff7c0'; ctx.shadowBlur=20;
    const cx2=x, cy2=y-size-8;
    ctx.beginPath();
    ctx.moveTo(cx2-12,cy2+6); ctx.lineTo(cx2-12,cy2-6);
    ctx.lineTo(cx2-6,cy2); ctx.lineTo(cx2,cy2-10);
    ctx.lineTo(cx2+6,cy2); ctx.lineTo(cx2+12,cy2-6);
    ctx.lineTo(cx2+12,cy2+6); ctx.closePath(); ctx.fill();
    // Crown jewels
    ctx.fillStyle='#fff'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(cx2,cy2-8,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx2-9,cy2-4,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx2+9,cy2-4,2,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // 2 DRONE LISTRIK samping kiri & kanan
    const dronePositions=[
      {ox: -(size*2.2+Math.sin(frame/20)*4), oy: 0},
      {ox: +(size*2.2+Math.sin(frame/20)*4), oy: 0}
    ];
    dronePositions.forEach((dp,di)=>{
      const dx2=x+dp.ox, dy2=y+dp.oy;
      ctx.save();
      // Drone body - hexagonal golden
      ctx.shadowColor='#fbbf24'; ctx.shadowBlur=18;
      const dg=ctx.createRadialGradient(dx2,dy2,2,dx2,dy2,12);
      dg.addColorStop(0,'#fff7c0'); dg.addColorStop(0.5,'#fbbf24'); dg.addColorStop(1,'#92400e');
      ctx.fillStyle=dg;
      ctx.beginPath();
      for(let k=0;k<6;k++){
        const ha=(k/6)*Math.PI*2-Math.PI/6;
        const hx=dx2+Math.cos(ha)*12, hy=dy2+Math.sin(ha)*12;
        if(k===0) ctx.moveTo(hx,hy); else ctx.lineTo(hx,hy);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#fde047'; ctx.lineWidth=1.5; ctx.stroke();
      // Inner glow core
      ctx.fillStyle='#fff'; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(dx2,dy2,4+Math.sin(frame/8)*1.5,0,Math.PI*2); ctx.fill();
      // Electric arc ke badan kapal
      ctx.strokeStyle=`rgba(253,224,71,${0.4+0.4*Math.sin(frame/5+di)})`; ctx.lineWidth=1.5;
      ctx.setLineDash([3,4]);
      ctx.beginPath(); ctx.moveTo(dx2+(di===0?12:-12),dy2); ctx.lineTo(x+(di===0?-size*0.7:size*0.7),y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // DRONE CHARGING visual
      if(tgDroneCharging){
        const cr=tgDroneChargeTimer/120;
        ctx.save();
        ctx.strokeStyle=`rgba(253,224,71,${cr*0.9})`; ctx.lineWidth=2+cr*4;
        ctx.shadowColor='#fbbf24'; ctx.shadowBlur=20*cr;
        ctx.beginPath(); ctx.arc(dx2,dy2,12+cr*10,0,Math.PI*2); ctx.stroke();
        // Electricity sparks
        for(let k=0;k<3;k++){
          const sa=(k/3)*Math.PI*2+frame/4;
          ctx.strokeStyle=`rgba(255,255,200,${cr*0.8})`;
          ctx.lineWidth=1.5; ctx.beginPath();
          ctx.moveTo(dx2,dy2);
          ctx.lineTo(dx2+Math.cos(sa)*(14+cr*12),dy2+Math.sin(sa)*(14+cr*12));
          ctx.stroke();
        }
        ctx.restore();
      }

      // DRONE FIRING visual
      if(tgDroneFiring && tgDroneFireTimer>0){
        ctx.save();
        const ft=tgDroneFireTimer/120;
        // Beam ke depan
        const bw=8+ft*6;
        ctx.strokeStyle=`rgba(253,224,71,${ft*0.95})`; ctx.lineWidth=bw;
        ctx.shadowColor='#fbbf24'; ctx.shadowBlur=30;
        ctx.beginPath(); ctx.moveTo(dx2,dy2); ctx.lineTo(dx2,Math.min(dy2,-30)); ctx.stroke();
        // White core beam
        ctx.strokeStyle=`rgba(255,255,255,${ft*0.8})`; ctx.lineWidth=bw*0.4; ctx.shadowBlur=15;
        ctx.beginPath(); ctx.moveTo(dx2,dy2); ctx.lineTo(dx2,Math.min(dy2,-30)); ctx.stroke();
        ctx.restore();
      }
    });
    // Draw TG Strike effect
    if(tgStrikeActive){
      const ft=tgStrikeTimer/(10*60);
      // Screen overlay
      const sg=ctx.createLinearGradient(0,0,0,canvas.height);
      sg.addColorStop(0,`rgba(253,224,71,${0.15*ft})`);
      sg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sg; ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    // Draw chained meteors
    tgChainedMeteors.forEach(cm=>{
      if(!meteors.includes(cm.meteor)) return;
      const m=cm.meteor;
      const timeRatio=cm.ropeTimer/(25*60);
      // Tali listrik (rope) dari player ke meteor
      ctx.save();
      // Outer glow rope
      ctx.strokeStyle=`rgba(253,224,71,${0.4+0.3*Math.sin(frame/6+cm.chainId)})`; 
      ctx.lineWidth=3; ctx.shadowColor='#fbbf24'; ctx.shadowBlur=12;
      ctx.setLineDash([6,5]);
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(m.x,m.y); ctx.stroke();
      // Inner white core rope
      ctx.strokeStyle=`rgba(255,255,220,0.6)`; ctx.lineWidth=1.2; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(m.x,m.y); ctx.stroke();
      ctx.setLineDash([]);
      // Electric sparks along rope
      const steps=3;
      for(let sp=1;sp<=steps;sp++){
        const t=sp/(steps+1);
        const sx=x+(m.x-x)*t+(Math.sin(frame/4+sp+cm.chainId)*6);
        const sy=y+(m.y-y)*t+(Math.cos(frame/3+sp)*4);
        ctx.fillStyle=`rgba(253,224,71,${0.7+0.3*Math.sin(frame/5+sp)})`;
        ctx.shadowColor='#fbbf24'; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(sx,sy,2.5,0,Math.PI*2); ctx.fill();
      }
      // Bound ring around meteor - makin merah kalau hampir habis
      const ringColor=timeRatio>0.3?`rgba(253,224,71,${0.6+0.3*Math.sin(frame/5)})`:`rgba(239,68,68,${0.7+0.3*Math.sin(frame/3)})`;
      ctx.strokeStyle=ringColor; ctx.lineWidth=2.5;
      ctx.shadowColor=timeRatio>0.3?'#fbbf24':'#ef4444'; ctx.shadowBlur=15;
      ctx.beginPath(); ctx.arc(m.x,m.y,m.size+7+Math.sin(frame/6+cm.chainId)*3,0,Math.PI*2); ctx.stroke();
      // Timer countdown
      const remaining=Math.ceil(cm.ropeTimer/60);
      ctx.font=`bold 12px Rajdhani,sans-serif`; 
      ctx.fillStyle=timeRatio>0.3?'#fde047':'#f87171';
      ctx.textAlign='center'; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=8;
      ctx.fillText(`⚡${remaining}s`,m.x,m.y-m.size-10);
      ctx.restore();
    });
  }

  // === SKIN SCI-FI v4.5 ===
  if(skin==='mecha'){
    // Robot - body kotak + bahu
    ctx.fillStyle='#94a3b8'; ctx.shadowColor='#06b6d4'; ctx.shadowBlur=14;
    // Kepala
    ctx.fillRect(x-8,y-size-8,16,12);
    // Mata menyala
    ctx.fillStyle='#06b6d4'; ctx.fillRect(x-5,y-size-5,4,4); ctx.fillRect(x+1,y-size-5,4,4);
    // Bahu kiri kanan
    ctx.fillStyle='#64748b';
    ctx.fillRect(x-size-4,y-size*0.3,10,size*0.6);
    ctx.fillRect(x+size-6,y-size*0.3,10,size*0.6);
    // Knuckle glow
    ctx.fillStyle='#06b6d4';
    ctx.beginPath(); ctx.arc(x-size-2,y,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+size+2,y,5,0,Math.PI*2); ctx.fill();
  }

  if(skin==='alien'){
    // Badan oval hijau + mata besar
    const pulse=Math.sin(frame*0.08)*3;
    ctx.fillStyle='#4ade80'; ctx.shadowColor='#4ade80'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.ellipse(x,y,size*0.8,size*1.1,0,0,Math.PI*2); ctx.fill();
    // Mata besar hitam oval
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(x-8,y-4,6,9,Math.PI*0.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+8,y-4,6,9,-Math.PI*0.1,0,Math.PI*2); ctx.fill();
    // Pupil cyan
    ctx.fillStyle='#06b6d4';
    ctx.beginPath(); ctx.ellipse(x-7,y-4,3,5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+8,y-4,3,5,0,0,Math.PI*2); ctx.fill();
    // Antena
    ctx.strokeStyle='#4ade80'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x-5,y-size*1.1); ctx.lineTo(x-5,y-size*1.1-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+5,y-size*1.1); ctx.lineTo(x+5,y-size*1.1-10); ctx.stroke();
    ctx.fillStyle='#fde047'; ctx.beginPath(); ctx.arc(x-5,y-size*1.1-12,3+pulse*0.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+5,y-size*1.1-12,3+pulse*0.2,0,Math.PI*2); ctx.fill();
  }

  if(skin==='cyber'){
    // Pesawat futuristik dengan grid lines
    const cg=ctx.createLinearGradient(x-size,y-size,x+size,y+size);
    cg.addColorStop(0,'#1e40af'); cg.addColorStop(1,'#7c3aed');
    ctx.fillStyle=cg; ctx.shadowColor='#818cf8'; ctx.shadowBlur=20;
    // Body utama
    ctx.beginPath();
    ctx.moveTo(x,y-size*1.2);
    ctx.lineTo(x-size*0.4,y-size*0.1);
    ctx.lineTo(x-size,y+size*0.9);
    ctx.lineTo(x-size*0.3,y+size*0.5);
    ctx.lineTo(x,y+size*0.8);
    ctx.lineTo(x+size*0.3,y+size*0.5);
    ctx.lineTo(x+size,y+size*0.9);
    ctx.lineTo(x+size*0.4,y-size*0.1);
    ctx.closePath(); ctx.fill();
    // Hex grid effect
    ctx.strokeStyle='rgba(129,140,248,0.5)'; ctx.lineWidth=0.8;
    for(let i=-1;i<=1;i++){
      ctx.beginPath(); ctx.moveTo(x+i*10,y-size); ctx.lineTo(x+i*10,y+size); ctx.stroke();
    }
    // Core glow
    ctx.fillStyle='#a5f3fc'; ctx.shadowColor='#a5f3fc'; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.arc(x,y,5+Math.sin(frame*0.1)*2,0,Math.PI*2); ctx.fill();
  }

  // Baryon drones
  if(baryonUlt&&baryonDrones.length){
    baryonDrones.forEach(d=>{
      ctx.fillStyle=d.color; ctx.shadowColor=d.color; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(d.x,d.y,13,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    });
  }

  // Yuichiro — gambar ulang seluruh ship
  if(skin==='yuichiro') drawYuichiro(x,y,size);
  if(skin==='dark_beast') drawDarkBeast(x,y,size);
  if(skin==='haki') drawHaki(x,y,size);
  if(skin==='portal') drawPortalSkin(x,y,size);
  if(skin==='flower_gacha') drawFlowerGacha(x,y,size);
  if(skin==='tiger_gacha')  drawTigerGacha(x,y,size);
  if(skin==='meteor_gacha') drawMeteorGacha(x,y,size);
  if(skin==='wind_gacha')   drawWindGacha(x,y,size);
  if(skin==='void_dual')    drawVoidDual(x,y,size);
  if(skin==='life_dual')    drawLifeDual(x,y,size);
  if(skin==='black')        drawBlackSkin(x,y,size);
  if(skin==='red_crystal')  drawRedCrystal(x,y,size);
  if(skin==='gold_gacha')   drawGoldGacha(x,y,size);
  if(skin==='superlives_gacha') drawSuperLivesGacha(x,y,size);





  // Hard reset before restore
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
  ctx.setLineDash([]);
  ctx.lineWidth = 1;
  ctx.restore();
}


function drawMinimap(){
  const mc=document.getElementById('mc');
  const mctx=mc.getContext('2d');
  const W=mc.width,H=mc.height;
  // Scale berdasarkan zona, center SELALU ikut player
  // Scale minimap sesuai zona
  let scale;
  if(_currentZone==='milky')           scale=W/60000;
  else if(_currentZone==='andromeda')  scale=W/60000;
  else if(_currentZone==='sector1')    scale=W/500000;
  else if(_currentZone==='sector2')    scale=W/2000000;
  else                                  scale=W/3000000;
  // Center minimap pada player
  const mmOriginX=W/2 - player.wx*scale;
  const mmOriginY=H/2 - player.wy*scale;
  mctx.clearRect(0,0,W,H);
  mctx.fillStyle='rgba(0,0,0,0.9)';mctx.fillRect(0,0,W,H);

  // Helper: draw star shape (matahari)
  function mmStar(x,y,r,col){
    mctx.fillStyle=col; mctx.shadowColor=col; mctx.shadowBlur=5;
    mctx.beginPath();
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2, rr=i%2===0?r:r*0.45;
      if(i===0) mctx.moveTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);
      else mctx.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);
    }
    mctx.closePath(); mctx.fill(); mctx.shadowBlur=0;
  }

  // Helper: draw triangle (NPC)
  function mmTriangle(x,y,size,col,angle){
    mctx.fillStyle=col;
    mctx.save(); mctx.translate(x,y); mctx.rotate(angle||0);
    mctx.beginPath();
    mctx.moveTo(0,-size); mctx.lineTo(size*0.7,size*0.7);
    mctx.lineTo(-size*0.7,size*0.7); mctx.closePath(); mctx.fill();
    mctx.restore();
  }

  // Helper: draw diamond (player)
  function mmDiamond(x,y,size,col){
    mctx.fillStyle=col; mctx.shadowColor=col; mctx.shadowBlur=6;
    mctx.beginPath();
    mctx.moveTo(x,y-size); mctx.lineTo(x+size,y);
    mctx.lineTo(x,y+size); mctx.lineTo(x-size,y);
    mctx.closePath(); mctx.fill(); mctx.shadowBlur=0;
  }

  // Helper: draw circle (planet/moon)
  function mmCircle(x,y,r,col){
    mctx.fillStyle=col;
    mctx.beginPath(); mctx.arc(x,y,r,0,Math.PI*2); mctx.fill();
  }

  // ── Orbit rings (faint) - hanya di dalam galaxy ──
  if(_currentZone==='milky'){
    const mSx=mmOriginX+0*scale, mSy=mmOriginY+0*scale;
    for(const p of PLANETS){
      mctx.beginPath();
      mctx.arc(mSx,mSy,p.orbitR*scale,0,Math.PI*2);
      mctx.strokeStyle='rgba(255,255,255,0.05)';
      mctx.lineWidth=0.5; mctx.stroke();
    }
  } else if(_currentZone==='andromeda'){
    const aSx=mmOriginX+ANDROMEDA_CX*scale, aSy=mmOriginY;
    for(const p of ANDROMEDA_PLANETS){
      mctx.beginPath();
      mctx.arc(aSx,aSy,p.orbitR*scale,0,Math.PI*2);
      mctx.strokeStyle='rgba(253,164,175,0.05)';
      mctx.lineWidth=0.5; mctx.stroke();
    }
  }

  // ── Matahari Bimasakti - hanya di milky/void1 ──
  if(_mmFilter.sun && (_currentZone==='milky'||_currentZone==='void1')){
    const mmMilkyX=mmOriginX+0*scale, mmMilkyY=mmOriginY;
    if(mmMilkyX>-10&&mmMilkyX<W+10) mmStar(mmMilkyX,mmMilkyY,5,'#fde047');
  }
  // ── Matahari Andromeda - hanya di andromeda/void3 ──
  if(_mmFilter.sun){
    const mmAndroX=mmOriginX+SUN_ANDROMEDA.wx*scale, mmAndroY=mmOriginY+SUN_ANDROMEDA.wy*scale;
    if(mmAndroX>-10&&mmAndroX<W+10&&mmAndroY>-10&&mmAndroY<H+10) mmStar(mmAndroX,mmAndroY,4,'#fda4af');
  }
  // Void 2 - tampilkan kedua galaxy di kejauhan sebagai titik kecil
  if(_currentZone==='sector2'||_currentZone==='sector1'||_currentZone==='sector3'){
    const mx=mmOriginX, my=mmOriginY;
    const ax=mmOriginX+SUN_ANDROMEDA.wx*scale, ay=mmOriginY+SUN_ANDROMEDA.wy*scale;
    if(mx>0&&mx<W) mmStar(mx,my,3,'rgba(253,224,71,0.5)');
    if(ax>0&&ax<W) mmStar(ax,ay,3,'rgba(253,164,175,0.5)');
  }
  // Zona line indicators
  mctx.strokeStyle='rgba(255,255,255,0.08)'; mctx.lineWidth=0.5; mctx.setLineDash([2,4]);
  // Zona lines di minimap
  [SECTOR1_START,SECTOR1_END,SECTOR2_END,SECTOR3_END].forEach(x=>{
    const lx=mmOriginX+x*scale; if(lx>0&&lx<W){mctx.beginPath();mctx.moveTo(lx,0);mctx.lineTo(lx,H);mctx.stroke();}
    const lx2=mmOriginX-x*scale; if(lx2>0&&lx2<W){mctx.beginPath();mctx.moveTo(lx2,0);mctx.lineTo(lx2,H);mctx.stroke();}
  });
  mctx.setLineDash([]);

  // ── Planets ──
  // Andromeda planets - hanya tampil di andromeda & void3
  if(_mmFilter.planet && (_currentZone==='andromeda'||_currentZone==='void3'))
  for(const p of ANDROMEDA_PLANETS){
    const px2=mmOriginX+p.wx*scale, py2=mmOriginY+p.wy*scale;
    if(px2<-5||px2>W+5||py2<-5||py2>H+5) continue;
    mctx.fillStyle=p.col;
    mctx.beginPath();mctx.arc(px2,py2,1.8,0,Math.PI*2);mctx.fill();
  }
  // Milky planets - hanya tampil di milky & void1
  if(_mmFilter.planet && (_currentZone==='milky'||_currentZone==='void1'))
  for(const p of PLANETS){
    const px2=mmOriginX+p.wx*scale, py2=mmOriginY+p.wy*scale;
    if(px2<-5||px2>W+5||py2<-5||py2>H+5) continue;
    mmCircle(px2,py2,2.5,p.col);
    if(_currentZone==='milky'&&p.orbitR<14000){
      mctx.fillStyle='rgba(255,255,255,0.3)';
      mctx.font='5px Courier New,monospace';
      mctx.textAlign='center';
      mctx.fillText(p.icon,px2,py2-4);
    }
  }

  // ── Moon - hanya di milky ──
  if(_mmFilter.planet && _currentZone==='milky'){
    const mx2=mmOriginX+MOON.wx*scale, my2=mmOriginY+MOON.wy*scale;
    if(mx2>0&&mx2<W&&my2>0&&my2<H)
      mmCircle(mx2,my2,1.5,'#94a3b8');
  }

  // ── NPC ships - hanya tampil di galaxy yang sama ──
  if(_mmFilter.npc && (_currentZone==='milky'||_currentZone==='void1')) for(const n of NPCS){
    const nx=mmOriginX+n.wx*scale, ny=mmOriginY+n.wy*scale;
    if(nx<-5||nx>W+5||ny<-5||ny>H+5) continue;
    mmTriangle(nx,ny,3,n.col||'#fb923c',n.angle);
  }

  // ── Player (diamond putih bercahaya) ──  // (always shown)
  const ppx=mmOriginX+player.wx*scale, ppy=mmOriginY+player.wy*scale;
  if(fin(ppx)&&fin(ppy)){
    mmDiamond(
      Math.max(5,Math.min(W-5,ppx)),
      Math.max(5,Math.min(H-5,ppy)),
      4,'#7dd3fc'
    );
  }

  // ── Player always shown ──
  // ── Label ──
  // Zone label
  const zoneLabels={milky:'🌌 BIMASAKTI',andromeda:'🌸 ANDROMEDA',sector1:'🌫️ SEKTOR α',sector2:'🌑 SEKTOR β',sector3:'⬛ SEKTOR γ',empty:'🌌 HAMPA'};
  mctx.fillStyle='rgba(255,255,255,0.35)';mctx.font='bold 6px Courier New,monospace';
  mctx.textAlign='center';mctx.fillText(zoneLabels[_currentZone]||'MINI MAP',W/2,H-2);
}

function goBack(){
  localStorage.setItem('explorerPosX',fin(player.wx)?Math.round(player.wx):0);
  localStorage.setItem('explorerPosY',fin(player.wy)?Math.round(player.wy):0);
  window.location.href='index.html';
}

// Init position
const _sx=parseFloat(localStorage.getItem('explorerPosX'));
const _sy=parseFloat(localStorage.getItem('explorerPosY'));
if(isFinite(_sx)&&isFinite(_sy)&&!isNaN(_sx)&&!isNaN(_sy)){
  player.wx=_sx;player.wy=_sy;camX=_sx;camY=_sy;
} else {
  // Default spawn - safe fixed position
  player.wx=0; player.wy=1200; camX=0; camY=1200;
}

// Pinch zoom support
let pinchDist0=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    e.preventDefault();
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinchDist0>0){
      zoomLevel=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoomLevel*(d/pinchDist0)));
      pinchDist0=d;
      updateZoomLabel();
    }
    e.preventDefault();
  }
},{passive:false});
// Mouse scroll zoom
canvas.addEventListener('wheel',e=>{
  if(e.deltaY<0) zoomIn(); else zoomOut();
  e.preventDefault();
},{passive:false});

let _lastTime=0;
const TARGET_FPS=30, FRAME_MS=1000/TARGET_FPS;
function loop(ts){
  requestAnimationFrame(loop);
  if(ts-_lastTime < FRAME_MS) return; // cap to 30fps
  _lastTime=ts;
  try{update();}catch(e){console.warn('U',e);}
  try{draw();}catch(e){console.warn('D',e);}
}
loop();
</script>
