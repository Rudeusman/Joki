<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌌 Space Explorer v2</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#000; overflow:hidden; }
#c { display:block; position:fixed; top:0; left:0; }
#hud-top { position:fixed; top:0; left:0; z-index:20; padding:10px 12px; display:flex; flex-direction:column; gap:5px; pointer-events:none; }
.hbox { background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.12); border-radius:9px; padding:5px 11px; font-family:'Courier New',monospace; font-size:0.7rem; color:rgba(255,255,255,0.65); white-space:nowrap; backdrop-filter:blur(5px); }
.hbox b { color:#7dd3fc; }
#bars { position:fixed; top:10px; right:12px; z-index:20; display:flex; flex-direction:column; gap:5px; pointer-events:none; }
.brow { display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:5px 10px; backdrop-filter:blur(5px); }
.blbl { font-family:'Courier New',monospace; font-size:0.58rem; color:rgba(255,255,255,0.45); width:40px; }
.btrack { width:78px; height:5px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
.bfill { height:100%; border-radius:3px; transition:width 0.1s; }
#boost-f { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
#warp-f  { background:linear-gradient(90deg,#6366f1,#818cf8); }
#warn { position:fixed; top:55px; left:50%; transform:translateX(-50%); background:rgba(220,38,38,0.88); border:1px solid #ef4444; border-radius:8px; padding:5px 16px; z-index:25; font-family:'Courier New',monospace; font-size:0.72rem; color:#fca5a5; letter-spacing:1px; display:none; pointer-events:none; animation:wp 0.5s infinite alternate; }
@keyframes wp { from{opacity:1}to{opacity:0.35} }
#minimap-wrap {
  position:fixed; bottom:155px; right:12px; z-index:20;
  display:flex; flex-direction:column-reverse; align-items:flex-end; gap:5px;
}
#minimap {
  width:120px; height:120px;
  background:rgba(0,0,0,0.88); border:1px solid rgba(255,255,255,0.15);
  border-radius:10px; overflow:hidden;
}
#mc { width:100%; height:100%; display:block; }
/* Filter buttons */
#mm-filters {
  display:flex; gap:3px; flex-wrap:wrap; justify-content:flex-end;
  max-width:120px; pointer-events:all;
}
.mm-btn {
  padding:3px 7px; border-radius:6px; border:none; cursor:pointer;
  font-family:'Courier New',monospace; font-size:0.55rem; font-weight:700;
  letter-spacing:0.5px; transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
  opacity:0.4;
}
.mm-btn.on { opacity:1; }
#mmb-sun  { background:rgba(253,224,71,0.25);  border:1px solid rgba(253,224,71,0.5);  color:#fde047; }
#mmb-planet { background:rgba(74,222,128,0.2); border:1px solid rgba(74,222,128,0.4);  color:#4ade80; }
#mmb-npc  { background:rgba(251,146,60,0.2);   border:1px solid rgba(251,146,60,0.4);  color:#fb923c; }
#mmb-sun.on  { background:rgba(253,224,71,0.35);  box-shadow:0 0 6px rgba(253,224,71,0.4); }
#mmb-planet.on { background:rgba(74,222,128,0.3); box-shadow:0 0 6px rgba(74,222,128,0.3); }
#mmb-npc.on  { background:rgba(251,146,60,0.3);   box-shadow:0 0 6px rgba(251,146,60,0.3); }
#popup { position:fixed; top:130px; left:50%; transform:translateX(-50%); z-index:20; background:rgba(4,2,13,0.92); border:1px solid rgba(56,189,248,0.4); border-radius:13px; padding:10px 16px; min-width:180px; max-width:260px; text-align:center; backdrop-filter:blur(10px); display:none; }
.pi { font-size:1.7rem; margin-bottom:3px; }
.pn { font-family:'Courier New',monospace; font-size:0.82rem; color:#7dd3fc; font-weight:700; }
.pd { font-size:0.67rem; color:rgba(255,255,255,0.4); margin-top:4px; line-height:1.4; }
.pc { font-size:0.6rem; color:#fbbf24; margin-top:5px; }
#ctrl { position:fixed; bottom:0; left:0; right:0; z-index:20; display:flex; justify-content:space-between; align-items:flex-end; padding:12px 14px 18px; pointer-events:none; }
#joy { width:120px; height:120px; position:relative; pointer-events:all; flex-shrink:0; touch-action:none; }
#jbase { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.15); }
#jknob { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:38px; height:38px; border-radius:50%; background:radial-gradient(circle,rgba(125,211,252,0.95),rgba(56,189,248,0.65)); border:2px solid rgba(56,189,248,0.85); box-shadow:0 0 12px rgba(56,189,248,0.5); will-change:transform; }
#abtns { display:flex; flex-direction:column; gap:8px; pointer-events:all; align-items:flex-end; }
.ab { padding:11px 20px; border-radius:10px; border:none; cursor:pointer; font-family:'Courier New',monospace; font-size:0.68rem; font-weight:700; letter-spacing:1px; min-width:118px; text-align:center; -webkit-tap-highlight-color:transparent; }
#bbk { background:rgba(220,38,38,0.3); border:1px solid rgba(239,68,68,0.5); color:#fca5a5; }
#bwarp { background:rgba(99,102,241,0.22); border:1px solid rgba(129,140,248,0.45); color:#a5b4fc; }
#bboost { background:rgba(245,158,11,0.22); border:1px solid rgba(251,191,36,0.45); color:#fde68a; }
#bwarp.on { background:rgba(99,102,241,0.6); box-shadow:0 0 14px rgba(99,102,241,0.5); }
#bboost.on { background:rgba(245,158,11,0.6); box-shadow:0 0 14px rgba(245,158,11,0.5); }
#blboost { background:rgba(139,92,246,0.22); border:1px solid rgba(167,139,250,0.5); color:#c4b5fd; }
#blboost.on { background:rgba(139,92,246,0.7); box-shadow:0 0 18px rgba(139,92,246,0.7); }
#blboost:disabled { opacity:0.3; }
#zoom-ctrl {
  position:fixed; bottom:155px; left:12px; z-index:20;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  pointer-events:all;
}
.zbtn {
  width:36px; height:36px; border-radius:8px; border:none; cursor:pointer;
  background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.8); font-size:1rem; font-weight:700;
  font-family:'Courier New',monospace; line-height:1;
  backdrop-filter:blur(5px); transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
  display:flex; align-items:center; justify-content:center;
}
.zbtn:hover { background:rgba(56,189,248,0.25); border-color:rgba(56,189,248,0.5); color:#7dd3fc; }
.zbtn:active { background:rgba(56,189,248,0.45); }
#zoom-label {
  font-family:'Courier New',monospace; font-size:0.6rem;
  color:rgba(255,255,255,0.45); background:rgba(0,0,0,0.75);
  border:1px solid rgba(255,255,255,0.1); border-radius:6px;
  padding:3px 6px; backdrop-filter:blur(5px); white-space:nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud-top">
  <div class="hbox">X: <b id="hx">0</b> &nbsp; Y: <b id="hy">0</b></div>
  <div class="hbox" id="hzone" style="color:#fbbf24;">🌌 Deep Space</div>
  <div class="hbox" id="hskin" style="color:#a5f3fc;">🚀 Default</div>
</div>
<div id="bars">
  <div class="brow"><span class="blbl">⚡BOOST</span><div class="btrack"><div class="bfill" id="boost-f" style="width:100%"></div></div></div>
  <div class="brow"><span class="blbl">🌀WARP</span><div class="btrack"><div class="bfill" id="warp-f" style="width:100%"></div></div></div>
</div>
<div id="warn">⚠️ TERLALU DEKAT MATAHARI!</div>
<div id="minimap-wrap">
  <div id="minimap"><canvas id="mc" width="120" height="120"></canvas></div>
  <div id="mm-filters">
    <button class="mm-btn on" id="mmb-sun"    onclick="mmToggle('sun')"   >☀️ SUN</button>
    <button class="mm-btn on" id="mmb-planet" onclick="mmToggle('planet')">🪐 PLN</button>
    <button class="mm-btn on" id="mmb-npc"    onclick="mmToggle('npc')"   >🚀 NPC</button>
  </div>
</div>
<div id="popup"><div class="pi" id="ppi">🪐</div><div class="pn" id="ppn">Planet</div><div class="pd" id="ppd"></div><div class="pc" id="ppc"></div></div>
<canvas id="npc-arrows" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15;"></canvas>
<div id="ctrl">
  <div id="joy"><div id="jbase"></div><div id="jknob"></div></div>
  <div id="abtns">
    <button class="ab" id="bbk" onclick="goBack()">← KEMBALI</button>
    <button class="ab" id="bwarp" onpointerdown="wOn()" onpointerup="wOff()">🌀 WARP</button>
    <button class="ab" id="bboost" onpointerdown="bOn()" onpointerup="bOff()">⚡ BOOST</button>
    <button class="ab" id="blboost" onpointerdown="lbOn()" onpointerup="lbOff()">🔆 LIGHT</button>
  </div>
</div>

<!-- Zoom controls -->
<div id="zoom-ctrl">
  <button class="zbtn" id="zbtn-in"  onclick="zoomIn()">+</button>
  <div id="zoom-label">100%</div>
  <button class="zbtn" id="zbtn-out" onclick="zoomOut()">−</button>
  <button class="zbtn" id="zbtn-rst" onclick="zoomReset()" style="font-size:0.6rem;">⌂</button>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
function resize(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ac=document.getElementById('npc-arrows');
  if(ac){ ac.width=window.innerWidth; ac.height=window.innerHeight; }
  const mc2=document.getElementById('mc'); if(mc2){mc2.width=120;mc2.height=120;}
}
resize(); window.addEventListener('resize',resize);

const activeSkin=localStorage.getItem('explorerSkin')||'default';
const SKIN_NAMES={'default':'🚀 Default','red':'🔴 Merah','green':'🟢 Hijau','blue':'🔵 Biru','violet':'✨ Violet','rainbow':'🌈 Rainbow','golden':'🪙 Golden Shard','diamond':'💎 Diamond','dark_spirit':'🌑 Dark Spirit','insting':'⚡ Insting','insting_v2':'⚡ Insting V2','ego':'💜 EGO','dragon':'🐉 Dragon','thunder':'⚡ Thunder','baryon':'🔥 Baryon','ultimate_ego':'🌟 Ultimate Ego','god_ramadhan':'☀️ God Ramadhan','phantom':'👻 Phantom','samurai':'⚔️ Samurai','nebula':'🌌 Nebula','crimson':'🔥 Crimson','void_walker':'🕳️ Void Walker','mecha':'🤖 Mecha','alien':'👾 Alien','cyber':'💻 Cyber','black':'⬛ Black','noob':'🛸 Noob','omni_adhack':'👑 Omni Ad-Hack','void_dual':'🔮 Void','life_dual':'🌿 Life','chronos':'⏳ Chronos','haki':'👊 Haki','kamui':'👁️ Kamui','yuichiro':'⚔️ Yuichiro','dark_beast':'🦁 Dark Beast','esdeath':'❄️ Esdeath','spirit_wraith':'👻 Spirit Wraith','nebula_deceiver':'🎭 Nebula Deceiver','portal':'🌀 Portal','phoenix':'🐦‍🔥 Phoenix','thunder_gold':'⚡👑 Thunder Gold','cosmic_eye':'👁️ Cosmic Eye','dragon_storm':'🐉⚡ Dragon Storm','ruby':'💎🔴 Ruby','cyborg':'🤖 Cyborg','rainbow_refleks':'🌈⚡ Rainbow Refleks'};
const SCOL={'default':'#67e8f9','red':'#f87171','green':'#4ade80','blue':'#60a5fa','violet':'#c084fc','golden':'#fbbf24','diamond':'#a5f3fc','dark_spirit':'#6b7280','insting':'#34d399','ego':'#c084fc','ultimate_ego':'#e879f9','baryon':'#fb923c','dragon':'#ef4444','thunder':'#fde047','dragon_storm':'#fb923c','god_ramadhan':'#fde068','phantom':'#a78bfa','samurai':'#e2e8f0','nebula':'#818cf8','crimson':'#fb7185','void_walker':'#6366f1','mecha':'#94a3b8','alien':'#4ade80','cyber':'#818cf8','insting_v2':'#f0f9ff','noob':'#a3a3a3','omni_adhack':'#4ade80','void_dual':'#a78bfa','life_dual':'#86efac','black':'#94a3b8','chronos':'#38bdf8','haki':'#ef4444','kamui':'#cc44ff','yuichiro':'#e2e8f0','dark_beast':'#f87171','esdeath':'#93d5ff','spirit_wraith':'#c084fc','nebula_deceiver':'#818cf8','portal':'#38bdf8','phoenix':'#fb923c','thunder_gold':'#fbbf24','cosmic_eye':'#a78bfa','ruby':'#fb7185','cyborg':'#94a3b8','rainbow_refleks':'#f9a8d4','rainbow':'#f9a8d4'};
document.getElementById('hskin').textContent=SKIN_NAMES[activeSkin]||'🚀 '+activeSkin;

let frame=0;
const player={wx:0,wy:0,angle:-Math.PI/2,size:18};
let camX=0,camY=0;
let zoomLevel=1.0;
let _currentZone='milky';
let _zoneNotifTimer=0;
let _zoneNotifData=null;
let _dMilky=0, _dAndro=0; // global - diupdate tiap frame di update()

function showZoneNotif(data){
  _zoneNotifData=data;
  _zoneNotifTimer=180; // 3 detik = 180 frames @ 60fps (atau ~6 detik @30fps)
}
const ZOOM_MIN=0.15,ZOOM_MAX=3.0;
// Performance: disable shadow when zoomed in (too expensive on mobile)
function sb(v){ return zoomLevel < 0.6 ? v : 0; }
function sbLow(v){ return zoomLevel < 0.4 ? v : 0; }
// Minimap filter state
const _mmFilter={sun:true, planet:true, npc:true};
function mmToggle(key){
  _mmFilter[key]=!_mmFilter[key];
  const btn=document.getElementById('mmb-'+key);
  if(btn) btn.classList.toggle('on', _mmFilter[key]);
}

function zoomIn(){zoomLevel=Math.min(ZOOM_MAX,zoomLevel*1.3);updateZoomLabel();}
function zoomOut(){zoomLevel=Math.max(ZOOM_MIN,zoomLevel/1.3);updateZoomLabel();}
function zoomReset(){zoomLevel=1.0;updateZoomLabel();}
function updateZoomLabel(){const el=document.getElementById('zoom-label');if(el)el.textContent=Math.round(zoomLevel*100)+'%';}

const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='ShiftLeft'||e.code==='ShiftRight')bOn();if(e.code==='KeyF'||e.code==='Space'){e.preventDefault();wOn();}if(e.code==='KeyL')lbOn();if(e.code==='Equal'||e.code==='NumpadAdd'){e.preventDefault();zoomIn();}if(e.code==='Minus'||e.code==='NumpadSubtract'){e.preventDefault();zoomOut();}if(e.code==='Digit0'||e.code==='Numpad0'){e.preventDefault();zoomReset();}});
window.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='ShiftLeft'||e.code==='ShiftRight')bOff();if(e.code==='KeyF'||e.code==='Space')wOff();if(e.code==='KeyL')lbOff();});

let bstActive=false,bstEnergy=100,warpActive=false,warpCD=0,lbActive=false,lbCD=0;
const LB_CD=600; // 10 detik cooldown
let lbHoldTime=0; // berapa lama light boost ditahan (frames)
let galaxyEntryTimer=0; // timer warp saat masuk galaxy
// Arah koridor = arah dari Bimasakti ke Andromeda, di-lock saat player pertama keluar milky
let _corridorAng = -Math.PI/2; // default: lurus ke atas (Y negatif)
let _corridorLocked = false;
// Ramp: 0-150f=boost, 150-300f=warp, 300+f=light speed
const LB_PHASE1=150, LB_PHASE2=300; // @30fps: 5 detik, 10 detik
const WCD=1200; // 20 detik cooldown setelah warp dilepas
function bOn(){bstActive=true;document.getElementById('bboost').classList.add('on');}
function bOff(){bstActive=false;document.getElementById('bboost').classList.remove('on');}
function wOn(){if(warpCD>0)return;warpActive=true;document.getElementById('bwarp').classList.add('on');}
function lbOn(){if(lbCD>0)return;lbActive=true;lbHoldTime=0;document.getElementById('blboost').classList.add('on');}
function lbOff(){
  if(lbActive){lbCD=LB_CD;}
  lbActive=false; lbHoldTime=0;
  document.getElementById('blboost').classList.remove('on');
}
function wOff(){
  if(warpActive){ // hanya trigger cooldown kalau warp memang aktif
    warpCD=WCD;
  }
  warpActive=false;
  document.getElementById('bwarp').classList.remove('on');
}

let joyActive=false,jDx=0,jDy=0,jOx=0,jOy=0,joyPtrId=-1;
const joyEl=document.getElementById('joy'),jknob=document.getElementById('jknob');

function resetJoy(){joyActive=false;jDx=0;jDy=0;joyPtrId=-1;jknob.style.transform='translate(-50%,-50%)';}

joyEl.addEventListener('pointerdown',e=>{
  if(joyActive) return; // ignore second finger
  joyActive=true; joyPtrId=e.pointerId;
  joyEl.setPointerCapture(e.pointerId); // capture so move/up always fires
  const r=document.getElementById('jbase').getBoundingClientRect();
  jOx=r.left+r.width/2; jOy=r.top+r.height/2;
  mJoy(e); e.preventDefault();
},{passive:false});

joyEl.addEventListener('pointermove',e=>{
  if(!joyActive||e.pointerId!==joyPtrId) return;
  mJoy(e);
});

joyEl.addEventListener('pointerup',e=>{
  if(e.pointerId===joyPtrId) resetJoy();
});
joyEl.addEventListener('pointercancel',e=>{
  if(e.pointerId===joyPtrId) resetJoy();
});
// Safety fallback - reset if finger lifts anywhere
window.addEventListener('pointerup',e=>{
  if(joyActive && e.pointerId===joyPtrId) resetJoy();
});

function mJoy(e){
  const dx=e.clientX-jOx,dy=e.clientY-jOy,d=Math.sqrt(dx*dx+dy*dy),mx=38;
  const cx=d<mx?dx:dx/d*mx,cy=d<mx?dy:dy/d*mx;
  jknob.style.transform=`translate(calc(-50% + ${cx}px),calc(-50% + ${cy}px))`;
  jDx=cx/mx; jDy=cy/mx;
}

const SUN={wx:0,wy:0,r:220,dangerR:520};

// ── ZONA GALAXY ──
const GALAXY_MILKY_RADIUS     = 25000;
const GALAXY_ANDROMEDA_RADIUS = 22000;
// Andromeda FIXED di atas Bimasakti (Y negatif = ke atas)
const ANDROMEDA_FIXED_X = 0;
const ANDROMEDA_FIXED_Y = -1307000; // jauh di atas

// Zona void — waktu tembus pakai Light Boost (2000 unit/frame @30fps):
// Sektor I  : 3 detik  = 180,000 unit
// Sektor II : 8 detik  = 480,000 unit
// Sektor III: 10 detik = 600,000 unit
const SECTOR1_START = 25000;
const SECTOR1_END   = 205000;
const SECTOR2_START = 205000;
const SECTOR2_END   = 685000;
const SECTOR3_START = 685000;
const SECTOR3_END   = 1285000;

// Andromeda CENTER = FIXED di atas Bimasakti
const ANDROMEDA_CX = ANDROMEDA_FIXED_X;
const ANDROMEDA_CY = ANDROMEDA_FIXED_Y;

// Andromeda position is fixed - no update needed



// Andromeda Sun
const SUN_ANDROMEDA = {wx:ANDROMEDA_FIXED_X, wy:ANDROMEDA_FIXED_Y, r:280, dangerR:600, col:'#fda4af'};

// Planet Andromeda - tata surya alien
const ANDROMEDA_PLANET_DEFS = [
  {orbitR:1500, orbitSpeed:0.00051,angle0:1.2, r:50, col:'#fda4af',icon:'🔴',name:'Krypton',  desc:'Planet merah terang, atmosfer xenon murni.'},
  {orbitR:2800, orbitSpeed:0.00038,angle0:3.1, r:80, col:'#c084fc',icon:'💜',name:'Voltara',  desc:'Planet ungu misterius, gravitasinya 3x Bumi.'},
  {orbitR:4200, orbitSpeed:0.00026,angle0:0.5, r:95, col:'#22d3ee',icon:'🩵',name:'Aqualis',  desc:'Planet seluruhnya ditutupi lautan neon.'},
  {orbitR:5800, orbitSpeed:0.00019,angle0:2.8, r:70, col:'#4ade80',icon:'🟢',name:'Zephyra',  desc:'Planet hijau neon, angin berkecepatan 5000 km/jam.'},
  {orbitR:7500, orbitSpeed:0.00014,angle0:1.8, r:180,col:'#fb7185',icon:'🌹',name:'Rosara',   desc:'Planet raksasa merah muda, cincin kristal.', rings:true},
  {orbitR:9500, orbitSpeed:0.00010,angle0:4.2, r:120,col:'#fde047',icon:'⭐',name:'Solaxis',  desc:'Planet emas, permukaannya plasma cair.'},
  {orbitR:11500,orbitSpeed:0.000077,angle0:0.9,r:105,col:'#818cf8',icon:'🔷',name:'Nebulax',  desc:'Planet biru-ungu, awan nebula menyelimutinya.'},
  {orbitR:14000,orbitSpeed:0.000056,angle0:3.5,r:90, col:'#f97316',icon:'🔶',name:'Pyraxis',  desc:'Planet api raksasa, suhu permukaan 8.000°C.'},
  {orbitR:17000,orbitSpeed:0.000039,angle0:1.5,r:140,col:'#67e8f9',icon:'❄️',name:'Glacidon', desc:'Planet es terbesar, mengandung air murni beku.'},
  {orbitR:20000,orbitSpeed:0.000027,angle0:5.2,r:85, col:'#a3e635',icon:'☢️',name:'Toxara',   desc:'Planet radioaktif, cahayanya bisa dilihat dari luar angkasa.'},
];

// Compute Andromeda planets (world positions updated each frame)
const ANDROMEDA_PLANETS = ANDROMEDA_PLANET_DEFS.map(p=>({
  ...p, angle:p.angle0,
  wx:ANDROMEDA_FIXED_X+Math.cos(p.angle0)*p.orbitR,
  wy:ANDROMEDA_FIXED_Y+Math.sin(p.angle0)*p.orbitR,
}));

// Stars di Andromeda
const STARS_ANDROMEDA=Array.from({length:150},()=>({
  wx:ANDROMEDA_FIXED_X+(Math.random()-0.5)*50000,
  wy:ANDROMEDA_FIXED_Y+(Math.random()-0.5)*50000,
  r:Math.random()*1.4+0.3, b:Math.random()
}));
// Orbit-based planet system
// orbitR = jarak dari matahari, orbitSpeed = kecepatan orbit (rad/frame), angle0 = sudut awal
const PLANET_DEFS = [

  orbitR: 180,    // jarak dari Bumi
  orbitSpeed: 0.002,

function updateOrbits(){
  for(const p of PLANETS){
    p.angle += p.orbitSpeed;
    p.wx = Math.cos(p.angle) * p.orbitR;
    p.wy = Math.sin(p.angle) * p.orbitR;
  }
  // Moon orbits Bumi (index 2)
  const bumi = PLANETS[2];
  MOON.angle += MOON.orbitSpeed;
  MOON.wx = bumi.wx + Math.cos(MOON.angle) * MOON.orbitR;
  MOON.wy = bumi.wy + Math.sin(MOON.angle) * MOON.orbitR;
  // Andromeda planets orbit (posisi fixed)
  for(const p of ANDROMEDA_PLANETS){
    p.angle += p.orbitSpeed;
    p.wx = SUN_ANDROMEDA.wx + Math.cos(p.angle)*p.orbitR;
    p.wy = SUN_ANDROMEDA.wy + Math.sin(p.angle)*p.orbitR;
  }
}

function makeComet(){
  const W=window.innerWidth, H=window.innerHeight;
  const side=Math.floor(Math.random()*4);
  let sx,sy,ang;
  if(side===0){sx=Math.random()*W;sy=-20;ang=Math.PI/2+((Math.random()-0.5)*0.5);}
  else if(side===1){sx=W+20;sy=Math.random()*H;ang=Math.PI+((Math.random()-0.5)*0.5);}
  else if(side===2){sx=Math.random()*W;sy=H+20;ang=-Math.PI/2+((Math.random()-0.5)*0.5);}
  else{sx=-20;sy=Math.random()*H;ang=(Math.random()-0.5)*0.5;}
  const spd=7+Math.random()*11;
  const col=['#ffffff','#c7e8ff','#fffacd','#fde68a','#b0c4ff'][Math.floor(Math.random()*5)];
  return{sx,sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    len:90+Math.random()*160,col,life:1.0,decay:0.007+Math.random()*0.011,
    r:Math.random()*1.5+0.5,trail:[]};
}

function w2s(wx,wy){return{x:canvas.width/2+(wx-camX)*zoomLevel,y:canvas.height/2+(wy-camY)*zoomLevel};}
function dst(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}
function fin(v){return typeof v==='number'&&isFinite(v)&&!isNaN(v);}

function sRad(x1,y1,r1,x2,y2,r2){
  if(!fin(x1)||!fin(y1)||!fin(x2)||!fin(y2)||r1<0||r2<0||!fin(r1)||!fin(r2)) return null;
  if(r1===r2) r2=r1+0.01;
  try{return ctx.createRadialGradient(x1,y1,r1,x2,y2,r2);}catch(e){return null;}
}
function sLin(x0,y0,x1,y1){
  if(!fin(x0)||!fin(y0)||!fin(x1)||!fin(y1)) return null;
  try{return ctx.createLinearGradient(x0,y0,x1,y1);}catch(e){return null;}
}
function lc(hex,a){if(!hex||!hex.startsWith('#'))return hex;let r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function dc(hex,a){if(!hex||!hex.startsWith('#'))return hex;let r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}

function getZone(){
  const d=dst(player.wx,player.wy,0,0);
  for(const p of PLANETS){if(dst(player.wx,player.wy,p.wx,p.wy)<p.r+150)return`🪐 Orbit ${p.name}`;}
  for(const n of NEBULAE){if(dst(player.wx,player.wy,n.wx,n.wy)<n.r)return'🌌 Nebula';}
  if(d<1500)return'☀️ Zona Matahari';
  if(d<6000)return'🔴 Tata Surya Dalam';
  if(d<12000)return'🟡 Tata Surya Tengah';
  if(d<20000)return'🔵 Tata Surya Luar';
  return'⬛ Deep Space';
}

let nearObj=null;
function update(){
  frame++;
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['KeyW'])dy=-1;
  if(keys['ArrowDown']||keys['KeyS'])dy=1;
  if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
  if(keys['ArrowRight']||keys['KeyD'])dx=1;
  if(joyActive&&(Math.abs(jDx)>0.08||Math.abs(jDy)>0.08)){dx=jDx;dy=jDy;}

  // Update planet orbits every frame
  updateOrbits();

  let spd=3.5;
  if(galaxyEntryTimer>0){
    galaxyEntryTimer--;
    spd=28; // warp speed saat baru masuk galaxy
  } else if(lbActive&&lbCD===0){
    lbHoldTime++;
    if(lbHoldTime<LB_PHASE1)       spd=8;
    else if(lbHoldTime<LB_PHASE2)  spd=28;
    else                            spd=2000;
  } else if(warpActive&&warpCD===0){
    spd=28;
  } else if(bstActive&&bstEnergy>0){
    spd=8;bstEnergy=Math.max(0,bstEnergy-0.9);if(bstEnergy===0)bOff();
  } else{bstEnergy=Math.min(100,bstEnergy+0.35);}
  if(warpCD>0)warpCD--;
  if(lbCD>0){lbCD--;if(lbCD===0){const lb=document.getElementById('blboost');if(lb)lb.textContent='🔆 LIGHT';lb&&(lb.style.opacity='1');}}
  // Update LB button
  const lbBtn=document.getElementById('blboost');
  if(lbBtn){
    if(lbActive){
      if(lbHoldTime<LB_PHASE1)      lbBtn.textContent='🔆 FASE 1';
      else if(lbHoldTime<LB_PHASE2) lbBtn.textContent='🔆 FASE 2';
      else                           lbBtn.textContent='🔆 ⚡⚡⚡';
    }
    else if(lbCD>0){lbBtn.textContent=`🔆 ${Math.ceil(lbCD/30)}s`;lbBtn.style.opacity='0.5';}
    else{lbBtn.textContent='🔆 LIGHT';lbBtn.style.opacity='1';}
  }

  const len=Math.sqrt(dx*dx+dy*dy)||1;
  if(dx!==0||dy!==0){
    player.wx+=(dx/len)*spd; player.wy+=(dy/len)*spd;
    player.angle=Math.atan2(dx,-dy); // ship body points UP, so up movement = angle 0
    if(lbActive&&lbCD===0){
      // Light boost trail — ungu/putih intensif
      for(let i=0;i<6;i++) spP(player.wx+(Math.random()-0.5)*30,player.wy+(Math.random()-0.5)*30,(Math.random()-0.5)*8,(Math.random()-0.5)*8,Math.random()<0.5?'rgba(196,181,253,0.9)':'rgba(255,255,255,0.8)',18,3+Math.random()*4);
    } else if(warpActive){for(let i=0;i<4;i++)spP(player.wx+(Math.random()-0.5)*10,player.wy+(Math.random()-0.5)*10,(Math.random()-0.5)*2,(Math.random()-0.5)*2,'rgba(129,140,248,0.7)',20,2+Math.random()*2);}
    else if(bstActive&&frame%3===0)spP(player.wx,player.wy,-(dx/len)*2+Math.random()-0.5,-(dy/len)*2+Math.random()-0.5,'rgba(251,191,36,0.6)',18,3);
  }

  const dSun=dst(player.wx,player.wy,0,0);
  const warn=document.getElementById('warn');
  if(dSun<SUN.dangerR&&dSun>1){
    const ax=player.wx/dSun,ay=player.wy/dSun;
    // Force gets much stronger the closer you are - prevents getting stuck
    const force=(SUN.dangerR-dSun)/SUN.dangerR*30 + (dSun<150?25:0);
    player.wx+=ax*force;player.wy+=ay*force;
    warn.style.display='block';
    if(frame%6===0)for(let i=0;i<3;i++)spP(player.wx+(Math.random()-0.5)*18,player.wy+(Math.random()-0.5)*18,(Math.random()-0.5)*3,(Math.random()-0.5)*3,'rgba(239,68,68,0.8)',22,3.5);
  } else {warn.style.display='none';}

  // Planet collision - player can't pass through
  // Moon collision too
  const dMoon=dst(player.wx,player.wy,MOON.wx,MOON.wy);
  if(dMoon<MOON.r+player.size+2&&dMoon>0){
    const ax=(player.wx-MOON.wx)/dMoon,ay=(player.wy-MOON.wy)/dMoon;
    player.wx=MOON.wx+ax*(MOON.r+player.size+3);
    player.wy=MOON.wy+ay*(MOON.r+player.size+3);
  }
  for(const p of PLANETS){
    const dpCol=dst(player.wx,player.wy,p.wx,p.wy);
    const minDist=p.r+player.size+2;
    if(dpCol<minDist&&dpCol>0){
      // Push player out
      const ax=(player.wx-p.wx)/dpCol, ay=(player.wy-p.wy)/dpCol;
      player.wx=p.wx+ax*(minDist+1);
      player.wy=p.wy+ay*(minDist+1);
    }
  }

  nearObj=null;
  for(const p of PLANETS){if(dst(player.wx,player.wy,p.wx,p.wy)<p.r+200){nearObj=p;break;}}
  if(!nearObj&&dst(player.wx,player.wy,MOON.wx,MOON.wy)<MOON.r+150)nearObj={...MOON,isMoon:true};
  if(!nearObj&&dst(player.wx,player.wy,STATION.wx,STATION.wy)<160)nearObj=STATION;

  const popup=document.getElementById('popup');
  if(nearObj){
    popup.style.display='block';
    document.getElementById('ppi').textContent=nearObj.icon||'🪐';
    document.getElementById('ppn').textContent=nearObj.name;
    document.getElementById('ppd').textContent=nearObj.desc||'';
    document.getElementById('ppc').textContent=`Koordinat: (${Math.round(nearObj.wx)}, ${Math.round(nearObj.wy)})`;
  } else popup.style.display='none';

  for(const n of NPCS){
    // Steering: smooth turn toward targetAngle
    n.turnTimer--;
    if(n.turnTimer<=0){
      n.targetAngle=Math.random()*Math.PI*2;
      n.turnTimer=60+Math.floor(Math.random()*120);
    }
    // Smooth angle interpolation - lebih responsif
    let da=n.targetAngle-n.angle;
    while(da>Math.PI) da-=Math.PI*2;
    while(da<-Math.PI) da+=Math.PI*2;
    n.angle+=da*0.06;
    // Apply velocity - lebih responsif
    n.vx=n.vx*0.88+Math.cos(n.angle)*n.spd*0.12;
    n.vy=n.vy*0.88+Math.sin(n.angle)*n.spd*0.12;
    n.wx+=n.vx; n.wy+=n.vy;
    n.trail.push({x:n.wx,y:n.wy});
    if(n.trail.length>18) n.trail.shift();
    // Solid collision: Sun
    const dnSun=dst(n.wx,n.wy,0,0);
    const minSunD=SUN.r+n.sz+5;
    if(dnSun<minSunD&&dnSun>0){
      // Push out dari matahari
      const ax=n.wx/dnSun, ay=n.wy/dnSun;
      n.wx=ax*(minSunD+1); n.wy=ay*(minSunD+1);
      // Bounce velocity
      const dot=n.vx*ax+n.vy*ay;
      n.vx-=2*dot*ax; n.vy-=2*dot*ay;
      n.targetAngle=Math.atan2(ay,ax);
      n.turnTimer=30;
    } else if(dnSun<SUN.dangerR*0.6){
      // Mulai menghindari sebelum kena
      n.targetAngle=Math.atan2(n.wy,n.wx)+Math.PI*(0.8+Math.random()*0.4);
      n.turnTimer=20;
    }
    // Solid collision: Planets
    for(const p of PLANETS){
      const dpn=dst(n.wx,n.wy,p.wx,p.wy);
      const minPD=p.r+n.sz+5;
      if(dpn<minPD&&dpn>0){
        // Push out dari planet
        const ax=(n.wx-p.wx)/dpn, ay=(n.wy-p.wy)/dpn;
        n.wx=p.wx+ax*(minPD+1); n.wy=p.wy+ay*(minPD+1);
        // Bounce velocity
        const dot=n.vx*ax+n.vy*ay;
        n.vx-=2*dot*ax*0.8; n.vy-=2*dot*ay*0.8;
        n.targetAngle=Math.atan2(ay,ax);
        n.turnTimer=40;
        // Spark efek
        spP(n.wx,n.wy,(Math.random()-0.5)*3,(Math.random()-0.5)*3,n.col,15,2);
      } else if(dpn<p.r+n.sz+120){
        // Mulai menghindari sebelum kena
        const ax=(n.wx-p.wx)/dpn, ay=(n.wy-p.wy)/dpn;
        n.targetAngle=Math.atan2(ay,ax)+(Math.random()-0.5)*1.5;
        if(n.turnTimer>15) n.turnTimer=15;
      }
    }
    // NPC-NPC collision
    for(const n2 of NPCS){
      if(n2===n) continue;
      const dnn=dst(n.wx,n.wy,n2.wx,n2.wy);
      const minD=n.sz+n2.sz+4;
      if(dnn<minD&&dnn>0){
        const ax=(n.wx-n2.wx)/dnn, ay=(n.wy-n2.wy)/dnn;
        const force=(minD-dnn)*0.5;
        n.vx+=ax*force*0.6; n.vy+=ay*force*0.6;
        n2.vx-=ax*force*0.6; n2.vy-=ay*force*0.6;
        // Spawn collision sparks
        if(dnn<minD*0.8) spP(n.wx,n.wy,(Math.random()-0.5)*3,(Math.random()-0.5)*3,n.col,15,2);
      }
    }
    // Player-NPC collision
    const dpn2=dst(player.wx,player.wy,n.wx,n.wy);
    const minPD=player.size+n.sz+2;
    if(dpn2<minPD&&dpn2>0){
      const ax=(player.wx-n.wx)/dpn2, ay=(player.wy-n.wy)/dpn2;
      const force=(minPD-dpn2)*0.8;
      // Player bounces
      player.wx+=ax*force*0.7; player.wy+=ay*force*0.7;
      // NPC bounces opposite
      n.vx-=ax*force*0.7; n.vy-=ay*force*0.7;
      n.targetAngle=Math.atan2(-ay,-ax); n.turnTimer=60;
      // Collision sparks
      for(let k=0;k<5;k++) spP(
        (player.wx+n.wx)/2+(Math.random()-0.5)*10,
        (player.wy+n.wy)/2+(Math.random()-0.5)*10,
        (Math.random()-0.5)*4,(Math.random()-0.5)*4,
        '#fbbf24',20,2+Math.random()*2
      );
    }
  }
  for(const a of ASTEROIDS){a.wx+=a.vx;a.wy+=a.vy;a.rot+=a.rs;}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)particles.splice(i,1);}

  if(fin(player.wx)&&fin(player.wy)){camX+=(player.wx-camX)*0.12;camY+=(player.wy-camY)*0.12;}

  // ── Zone detection (berdasarkan posisi X player) ──
  _dMilky=dst(player.wx,player.wy,0,0);
  _dAndro=dst(player.wx,player.wy,SUN_ANDROMEDA.wx,SUN_ANDROMEDA.wy);
  let _newZone;

  // Zone detection FINAL
  // Cek apakah player menuju Andromeda dengan dot product
  // dot > 0 = searah Andromeda, dot < 0 = berlawanan arah
  const _toAndroX = SUN_ANDROMEDA.wx;
  const _toAndroY = SUN_ANDROMEDA.wy;
  const _toAndroLen = Math.sqrt(_toAndroX*_toAndroX + _toAndroY*_toAndroY) || 1;
  // Normalisasi arah Andromeda dari pusat Bimasakti
  const _dirAX = _toAndroX / _toAndroLen;
  const _dirAY = _toAndroY / _toAndroLen;
  // Dot product: arah player dari pusat milky vs arah ke Andromeda
  const _dot = (player.wx * _dirAX + player.wy * _dirAY);
  // Player menuju andromeda kalau dot > 0 (lebih dari 90 derajat dari arah andromeda)
  const _towardAndro = _dot > 0;

  if(_dMilky <= GALAXY_MILKY_RADIUS){
    _newZone = 'milky'; // masuk dari ARAH MANAPUN
  } else if(_dAndro <= GALAXY_ANDROMEDA_RADIUS){
    _newZone = 'andromeda'; // masuk dari ARAH MANAPUN
  } else if(!_towardAndro){
    // Player menjauh dari Andromeda = ruang hampa kosong
    _newZone = 'empty';
  } else {
    // Player menuju Andromeda = ada sektor
    const _fromMilky = Math.max(0, _dMilky - GALAXY_MILKY_RADIUS);
    const _fromAndro = Math.max(0, _dAndro - GALAXY_ANDROMEDA_RADIUS);
    const _totalVoid = _fromMilky + _fromAndro;
    const _progress = _totalVoid > 0 ? _fromMilky / _totalVoid : 0;
    if(_progress < 0.33)      _newZone = 'sector1';
    else if(_progress < 0.66) _newZone = 'sector2';
    else                      _newZone = 'sector3';
  }

  if(_newZone!==_currentZone){
    const prev=_currentZone;
    _currentZone=_newZone;
    const msgs={
      milky:    {title:'🌌 Galaksi Bimasakti',  sub:'Memasuki galaksi asal. Kecepatan disesuaikan.',  col:'#7dd3fc'},
      sector1:  {title:'🌫️ Sektor Alfa',         sub:'Meninggalkan Bimasakti. Estimasi: 21 detik.',   col:'#94a3b8'},
      sector2:  {title:'🌑 Sektor Beta',          sub:'Memasuki kekosongan absolut...',                col:'#6b7280'},
      sector3:  {title:'⬛ Sektor Gamma',         sub:'Andromeda terdeteksi di kejauhan!',             col:'#a78bfa'},
      andromeda:{title:'🌸 Galaksi Andromeda',   sub:'Selamat datang! Kecepatan disesuaikan.',        col:'#fda4af'},
      empty:    {title:'🌌 Ruang Hampa',          sub:'Tidak ada yang di sini...',                     col:'#334155'},
    };
    showZoneNotif(msgs[_newZone]);

    // Masuk galaxy: warp speed 10 detik + reset light boost
    if(_newZone==='milky'||_newZone==='andromeda'){
      galaxyEntryTimer=300;
      if(lbActive){ lbHoldTime=0; lbOff(); }
      if(warpActive){ wOff(); }
    }
    // Saat masuk andromeda: pindahkan pusat andromeda ke posisi player
    // agar planet2 muncul di sekitar player dari arah manapun
    if(_newZone==='andromeda' && prev!=='andromeda'){
      // Snap Andromeda center ke posisi player + sedikit ke depan
      const ang=Math.atan2(player.wy,player.wx);
      // Pusat andromeda = GALAXY_ANDROMEDA_RADIUS di depan player
      const newAX=player.wx+Math.cos(ang)*GALAXY_ANDROMEDA_RADIUS;
      const newAY=player.wy+Math.sin(ang)*GALAXY_ANDROMEDA_RADIUS;
      SUN_ANDROMEDA.wx=newAX;
      SUN_ANDROMEDA.wy=newAY;
      // Update semua planet orbit ke pusat baru
      for(const p of ANDROMEDA_PLANETS){
        p.wx=newAX+Math.cos(p.angle)*p.orbitR;
        p.wy=newAY+Math.sin(p.angle)*p.orbitR;
      }
      // Update stars
      for(const st of STARS_ANDROMEDA){
        st.wx=newAX+(Math.random()-0.5)*50000;
        st.wy=newAY+(Math.random()-0.5)*50000;
      }
    }

  }


  document.getElementById('hx').textContent=fin(player.wx)?Math.round(player.wx):0;
  document.getElementById('hy').textContent=fin(player.wy)?Math.round(player.wy):0;
  // Update zone label dari _currentZone
  const zoneHudLabels={
    milky:'🌌 Galaksi Bimasakti',
    andromeda:'🌸 Galaksi Andromeda',
    sector1:'🌫️ Sektor Alfa',
    sector2:'🌑 Sektor Beta',
    sector3:'⬛ Sektor Gamma',
    empty:'🌌 Ruang Hampa'
  };
  document.getElementById('hzone').textContent=zoneHudLabels[_currentZone]||getZone();
  document.getElementById('boost-f').style.width=bstEnergy+'%';
  // Warp bar: cooldown recovery (0% saat baru lepas, 100% saat siap)
  document.getElementById('warp-f').style.width=(warpCD>0?((1-warpCD/WCD)*100):100)+'%';
  const wb=document.getElementById('bwarp');
  if(warpActive){
    wb.textContent='🌀 AKTIF';
    wb.style.opacity='1';
  } else if(warpCD>0){
    wb.textContent=`🌀 ${Math.ceil(warpCD/60)}s`;
    wb.style.opacity='0.5';
  } else {
    wb.textContent='🌀 WARP';
    wb.style.opacity='1';
  }
  // ── Update Comets ──
  _cometTimer++;
  if(_cometTimer>=COMET_INTERVAL && COMETS.length<8){
    _cometTimer=0;
    COMETS.push(makeComet());
  }
  for(let i=COMETS.length-1;i>=0;i--){
    const c=COMETS[i];
    c.trail.push({x:c.sx,y:c.sy});
    if(c.trail.length>Math.round(c.len/Math.hypot(c.vx,c.vy))) c.trail.shift();
    c.sx+=c.vx; c.sy+=c.vy;
    c.life-=c.decay;
    if(c.life<=0) COMETS.splice(i,1);
  }
}

function draw(){
  // Safety: ensure zone distances are computed
  if(!_dMilky) _dMilky=dst(player.wx,player.wy,0,0);
  if(!_dAndro)  _dAndro=dst(player.wx,player.wy,SUN_ANDROMEDA.wx,SUN_ANDROMEDA.wy);
  // Full context reset every frame - prevents skin effects leaking to background
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
  ctx.setLineDash([]);
  ctx.lineDashOffset = 0;
  ctx.lineWidth = 1;
  ctx.fillStyle = '#000008';
  ctx.strokeStyle = '#000008';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Nebulae - skip when zoomed in close
  if(zoomLevel<0.7) for(const n of NEBULAE){const s=w2s(n.wx,n.wy);if(!fin(s.x)||!fin(s.y))continue;const g=sRad(s.x,s.y,0,s.x,s.y,n.r);if(!g)continue;g.addColorStop(0,n.c+'0.07)');g.addColorStop(0.6,n.c+'0.03)');g.addColorStop(1,n.c+'0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,n.r,0,Math.PI*2);ctx.fill();}

  // ── BG Stars (tiled, parallax lambat) ──
  for(const st of STARS_BG){
    const px = (camX * 0.06) % TILE_BG;
    const py = (camY * 0.06) % TILE_BG;
    let sx = ((st.ox - px) % TILE_BG + TILE_BG) % TILE_BG;
    let sy = ((st.oy - py) % TILE_BG + TILE_BG) % TILE_BG;
    // tile coverage: render 2x2 tiles to fill any screen size
    for(let tx=0; tx<2; tx++) for(let ty=0; ty<2; ty++){
      const rx = sx + tx*TILE_BG - TILE_BG/2;
      const ry = sy + ty*TILE_BG - TILE_BG/2;
      if(rx<-2||rx>canvas.width+2||ry<-2||ry>canvas.height+2) continue;
      const a = 0.4 + st.b * 0.55;
      const sr = Math.max(0.8, st.r);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fillRect(rx-sr, ry-sr, sr*2, sr*2);
      // warna tint tipis
      if(st.col !== '#ffffff'){
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = st.col;
        ctx.fillRect(rx-sr, ry-sr, sr*2, sr*2);
        ctx.globalAlpha = 1;
      }
    }
  }

  // ── Mid Stars (twinkle + color, parallax sedang) ──
  for(const st of STARS_MID){
    const px = (camX * 0.18) % TILE_MID;
    const py = (camY * 0.18) % TILE_MID;
    let sx = ((st.ox - px) % TILE_MID + TILE_MID) % TILE_MID;
    let sy = ((st.oy - py) % TILE_MID + TILE_MID) % TILE_MID;
    const br = 0.5 + 0.5*Math.sin(frame/25 + st.tw);
    for(let tx=0; tx<2; tx++) for(let ty=0; ty<2; ty++){
      const rx = sx + tx*TILE_MID - TILE_MID/2;
      const ry = sy + ty*TILE_MID - TILE_MID/2;
      if(rx<-4||rx>canvas.width+4||ry<-4||ry>canvas.height+4) continue;
      const a = 0.45 + br*0.5;
      const sr = Math.max(0.8, st.r);
      ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
      ctx.fillRect(rx-sr, ry-sr, sr*2, sr*2);
      // Pulse glow
      if(st.pulse && br > 0.65){
        ctx.globalAlpha = br * 0.22;
        ctx.fillStyle = st.col || '#ffffff';
        ctx.beginPath(); ctx.arc(rx, ry, sr*5, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // ── Giant Stars (salib cahaya, parallax agak cepat) ──
  for(const st of STARS_GIANT){
    const px = (camX * 0.32) % TILE_GIANT;
    const py = (camY * 0.32) % TILE_GIANT;
    let sx = ((st.ox - px) % TILE_GIANT + TILE_GIANT) % TILE_GIANT;
    let sy = ((st.oy - py) % TILE_GIANT + TILE_GIANT) % TILE_GIANT;
    const br = 0.55 + 0.45*Math.sin(frame/18 + st.tw);
    for(let tx=0; tx<2; tx++) for(let ty=0; ty<2; ty++){
      const rx = sx + tx*TILE_GIANT - TILE_GIANT/2;
      const ry = sy + ty*TILE_GIANT - TILE_GIANT/2;
      if(rx<-6||rx>canvas.width+6||ry<-6||ry>canvas.height+6) continue;
      const sr = Math.max(1.2, st.r);
      // Outer glow
      ctx.globalAlpha = br * 0.22;
      ctx.fillStyle = st.col;
      ctx.beginPath(); ctx.arc(rx, ry, sr*5, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      // Core
      ctx.fillStyle = `rgba(255,255,255,${0.75 + br*0.25})`;
      ctx.beginPath(); ctx.arc(rx, ry, sr, 0, Math.PI*2); ctx.fill();
      // Cross spike
      const sp = sr * 5 * br;
      ctx.globalAlpha = br * 0.55;
      ctx.strokeStyle = st.col;
      ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.moveTo(rx-sp, ry); ctx.lineTo(rx+sp, ry); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx, ry-sp); ctx.lineTo(rx, ry+sp); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // ── Draw Comets ──
  for(const c of COMETS){
    if(c.trail.length<2) continue;
    ctx.save();
    ctx.globalAlpha=c.life;
    // Trail gradient
    for(let i=1;i<c.trail.length;i++){
      const t0=c.trail[i-1], t1=c.trail[i];
      const tf=i/c.trail.length;
      ctx.globalAlpha=c.life*tf*0.9;
      ctx.strokeStyle=c.col;
      ctx.lineWidth=(1-tf)*c.r*2.5+0.3;
      ctx.lineCap='round';
      ctx.shadowColor=c.col;
      ctx.shadowBlur=tf>0.7?6:0;
      ctx.beginPath();ctx.moveTo(t0.x,t0.y);ctx.lineTo(t1.x,t1.y);ctx.stroke();
    }
    ctx.shadowBlur=0;
    // Kepala komet
    ctx.globalAlpha=c.life*0.95;
    const hg=ctx.createRadialGradient(c.sx,c.sy,0,c.sx,c.sy,c.r*4);
    hg.addColorStop(0,'rgba(255,255,255,0.95)');
    hg.addColorStop(0.4,c.col+'bb');
    hg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=hg;
    ctx.beginPath();ctx.arc(c.sx,c.sy,c.r*4,0,Math.PI*2);ctx.fill();
    // Titik inti
    ctx.globalAlpha=c.life;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(c.sx,c.sy,c.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Sun (Bimasakti)
  ctx.shadowBlur=0;ctx.shadowColor='transparent'; // reset sebelum draw sun
  const ss=w2s(0,0);
  if(fin(ss.x)&&fin(ss.y)){
    const pulse=0.5+0.5*Math.sin(frame/22);
    const SR=SUN.r*zoomLevel; // sun radius scaled
    for(let i=3;i>0;i--){const rr=SR*(1+i*0.65);const g=sRad(ss.x,ss.y,SR*0.8,ss.x,ss.y,rr);if(!g)continue;g.addColorStop(0,`rgba(253,224,71,${0.09-i*0.02})`);g.addColorStop(1,'rgba(253,224,71,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(ss.x,ss.y,rr,0,Math.PI*2);ctx.fill();}
    const sg=sRad(ss.x-SR*0.2,ss.y-SR*0.2,0,ss.x,ss.y,SR);
    if(sg){sg.addColorStop(0,'#fffbeb');sg.addColorStop(0.5,'#fde047');sg.addColorStop(1,'#d97706');ctx.fillStyle=sg;}else ctx.fillStyle='#fde047';
    ctx.shadowColor='#fbbf24';ctx.shadowBlur=sb(28);ctx.beginPath();ctx.arc(ss.x,ss.y,SR,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2+frame/65;ctx.strokeStyle=`rgba(253,224,71,${0.1+pulse*0.07})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(ss.x,ss.y,SR+12+Math.sin(frame/18+i)*10,a,a+0.5);ctx.stroke();}
  }

  // Orbit paths (faint rings around sun)
  for(const p of PLANETS){
    const orbitAlpha = 0.06 + (dst(player.wx,player.wy,0,0)<p.orbitR+500?0.06:0);
    ctx.beginPath();
    ctx.arc(canvas.width/2+(0-camX)*zoomLevel, canvas.height/2+(0-camY)*zoomLevel,
            p.orbitR*zoomLevel, 0, Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${orbitAlpha})`;
    ctx.lineWidth=0.8; ctx.setLineDash([4,8]); ctx.stroke();
    ctx.setLineDash([]);
  } // end orbit paths if

  // Moon orbit path — hanya di dalam galaxy
  if(zoomLevel<0.8 && _currentZone==='milky'){
    const bumi=PLANETS[2];
    const bs=w2s(bumi.wx,bumi.wy);
    if(fin(bs.x)&&fin(bs.y)){
      ctx.beginPath();
      ctx.arc(bs.x,bs.y,MOON.orbitR*zoomLevel,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.1)';
      ctx.lineWidth=0.7; ctx.setLineDash([3,6]); ctx.stroke();
      ctx.setLineDash([]);
    }
  } // end moon orbit if

  // Planets Bimasakti - hanya tampil saat di dalam galaxy atau void1 dekat
  if(_dMilky<=GALAXY_MILKY_RADIUS+8000) for(const p of PLANETS){
    const ps=w2s(p.wx,p.wy);if(!fin(ps.x)||!fin(ps.y))continue;
    if(ps.x<-p.r*3||ps.x>canvas.width+p.r*3||ps.y<-p.r*3||ps.y>canvas.height+p.r*3)continue;
    const pr=p.r*zoomLevel;
    if(pr<2) continue; // skip if too small
    if(zoomLevel<0.5){ const pg=sRad(ps.x,ps.y,pr*0.4,ps.x,ps.y,pr*2.4); if(pg){pg.addColorStop(0,p.col+'33');pg.addColorStop(1,p.col+'00');ctx.fillStyle=pg;ctx.beginPath();ctx.arc(ps.x,ps.y,pr*2.4,0,Math.PI*2);ctx.fill();}}
    if(p.rings){ctx.save();ctx.translate(ps.x,ps.y);ctx.scale(1,0.28);ctx.strokeStyle='rgba(253,224,71,0.4)';ctx.lineWidth=7;ctx.beginPath();ctx.arc(0,0,p.r*1.9,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(253,224,71,0.25)';ctx.lineWidth=11;ctx.beginPath();ctx.arc(0,0,p.r*2.4,0,Math.PI*2);ctx.stroke();ctx.restore();}
    const pb=sRad(ps.x-pr*0.3,ps.y-pr*0.3,0,ps.x,ps.y,pr);
    if(pb){pb.addColorStop(0,lc(p.col,45));pb.addColorStop(0.6,p.col);pb.addColorStop(1,dc(p.col,45));ctx.fillStyle=pb;}else ctx.fillStyle=p.col;
    ctx.shadowColor=p.col;ctx.shadowBlur=sb(8);ctx.beginPath();ctx.arc(ps.x,ps.y,pr,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    if(dst(player.wx,player.wy,p.wx,p.wy)<p.r*15+500){ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font=`${Math.max(9,11*zoomLevel)}px Courier New,monospace`;ctx.textAlign='center';ctx.fillText(p.icon+' '+p.name,ps.x,ps.y+pr+14);}
  }

  // Moon of Earth - hanya di dalam galaxy
  if(_dMilky<=GALAXY_MILKY_RADIUS+5000){
    const ms=w2s(MOON.wx,MOON.wy);
    if(fin(ms.x)&&fin(ms.y)&&ms.x>-100&&ms.x<canvas.width+100&&ms.y>-100&&ms.y<canvas.height+100){
      const mr=MOON.r*zoomLevel;
      // Moon glow
      const mg=sRad(ms.x,ms.y,0,ms.x,ms.y,mr*2.5);
      if(mg){mg.addColorStop(0,'rgba(203,213,225,0.2)');mg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=mg;ctx.beginPath();ctx.arc(ms.x,ms.y,mr*2.5,0,Math.PI*2);ctx.fill();}
      // Moon body
      const mb=sRad(ms.x-mr*0.3,ms.y-mr*0.3,0,ms.x,ms.y,mr);
      if(mb){mb.addColorStop(0,'#f1f5f9');mb.addColorStop(0.5,'#cbd5e1');mb.addColorStop(1,'#64748b');ctx.fillStyle=mb;}
      else ctx.fillStyle='#cbd5e1';
      ctx.shadowColor='#94a3b8';ctx.shadowBlur=sb(6);
      ctx.beginPath();ctx.arc(ms.x,ms.y,mr,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      // Crater dots
      ctx.fillStyle='rgba(100,116,139,0.5)';
      ctx.beginPath();ctx.arc(ms.x-mr*0.2,ms.y-mr*0.1,mr*0.18,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ms.x+mr*0.25,ms.y+mr*0.2,mr*0.12,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ms.x-mr*0.05,ms.y+mr*0.3,mr*0.09,0,Math.PI*2);ctx.fill();
      // Label
      if(dst(player.wx,player.wy,MOON.wx,MOON.wy)<800){
        ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='9px Courier New,monospace';
        ctx.textAlign='center';ctx.fillText('🌙 Bulan',ms.x,ms.y+mr+12);
      }
    }
  }

  // ── Andromeda Galaxy objects (only draw if in range) ──
  const _distToAndro=dst(player.wx,player.wy,SUN_ANDROMEDA.wx,SUN_ANDROMEDA.wy);
  if(_currentZone==='andromeda' || _distToAndro<GALAXY_ANDROMEDA_RADIUS+80000){
    // Andromeda Sun
    const as2=w2s(SUN_ANDROMEDA.wx,SUN_ANDROMEDA.wy);
    if(fin(as2.x)&&fin(as2.y)){
      const AR=SUN_ANDROMEDA.r*zoomLevel;
      const pulse2=0.5+0.5*Math.sin(frame/22+1);
      // Glow merah muda
      for(let i=2;i>0;i--){
        const rr=AR*(1+i*0.65);
        const g2=sRad(as2.x,as2.y,AR*0.8,as2.x,as2.y,rr);
        if(g2){g2.addColorStop(0,`rgba(253,164,175,${0.09-i*0.02})`);g2.addColorStop(1,'rgba(253,164,175,0)');ctx.fillStyle=g2;ctx.beginPath();ctx.arc(as2.x,as2.y,rr,0,Math.PI*2);ctx.fill();}
      }
      const ag=sRad(as2.x-AR*0.2,as2.y-AR*0.2,0,as2.x,as2.y,AR);
      if(ag){ag.addColorStop(0,'#ffe4e6');ag.addColorStop(0.5,'#fda4af');ag.addColorStop(1,'#be123c');ctx.fillStyle=ag;}
      else ctx.fillStyle='#fda4af';
      ctx.shadowColor='#fda4af';ctx.shadowBlur=sb(28);
      ctx.beginPath();ctx.arc(as2.x,as2.y,AR,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.shadowColor='transparent'; // reset after andromeda sun
    }
    // Andromeda Stars
    for(const st of STARS_ANDROMEDA){
      const sx=canvas.width/2+(st.wx-camX)*zoomLevel;
      const sy=canvas.height/2+(st.wy-camY)*zoomLevel;
      if(sx<-2||sx>canvas.width+2||sy<-2||sy>canvas.height+2) continue;
      ctx.fillStyle=`rgba(253,164,175,${0.2+st.b*0.4})`;
      ctx.fillRect(sx-st.r,sy-st.r,st.r*2,st.r*2);
    }
    // Andromeda Planets
    for(const p of ANDROMEDA_PLANETS){
      const ps=w2s(p.wx,p.wy);if(!fin(ps.x)||!fin(ps.y))continue;
      if(ps.x<-p.r*3||ps.x>canvas.width+p.r*3||ps.y<-p.r*3||ps.y>canvas.height+p.r*3)continue;
      const pr=p.r*zoomLevel;
      if(pr<2) continue;
      if(p.rings){ctx.save();ctx.translate(ps.x,ps.y);ctx.scale(1,0.28);ctx.strokeStyle='rgba(253,164,175,0.4)';ctx.lineWidth=7;ctx.beginPath();ctx.arc(0,0,p.r*1.9,0,Math.PI*2);ctx.stroke();ctx.restore();}
      const pb=sRad(ps.x-pr*0.3,ps.y-pr*0.3,0,ps.x,ps.y,pr);
      if(pb){pb.addColorStop(0,lc(p.col,45));pb.addColorStop(0.6,p.col);pb.addColorStop(1,dc(p.col,45));ctx.fillStyle=pb;}else ctx.fillStyle=p.col;
      ctx.shadowColor=p.col;ctx.shadowBlur=sb(8);ctx.beginPath();ctx.arc(ps.x,ps.y,pr,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      if(dst(player.wx,player.wy,p.wx,p.wy)<p.r*15+500){
        ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font=`${Math.max(9,11*zoomLevel)}px Courier New,monospace`;
        ctx.textAlign='center';ctx.fillText(p.icon+' '+p.name,ps.x,ps.y+pr+14);
      }
    }
    // Andromeda planet orbit paths
    if(zoomLevel<0.8){
      for(const p of ANDROMEDA_PLANETS){
        const acx=canvas.width/2+(SUN_ANDROMEDA.wx-camX)*zoomLevel;
        const acy=canvas.height/2+(SUN_ANDROMEDA.wy-camY)*zoomLevel;
        ctx.beginPath();ctx.arc(acx,acy,p.orbitR*zoomLevel,0,Math.PI*2);
        ctx.strokeStyle='rgba(253,164,175,0.05)';ctx.lineWidth=0.5;ctx.stroke();
      }
    }
  }

  // Andromeda planet collision for player
  if(_currentZone==='andromeda' || _distToAndro<GALAXY_ANDROMEDA_RADIUS+50000){
    for(const p of ANDROMEDA_PLANETS){
      const dpCol=dst(player.wx,player.wy,p.wx,p.wy);
      const minDist=p.r+player.size+2;
      if(dpCol<minDist&&dpCol>0){
        const ax=(player.wx-p.wx)/dpCol,ay=(player.wy-p.wy)/dpCol;
        player.wx=p.wx+ax*(minDist+1);player.wy=p.wy+ay*(minDist+1);
      }
    }
    // Andromeda sun repulsion
    const dAS=dst(player.wx,player.wy,SUN_ANDROMEDA.wx,SUN_ANDROMEDA.wy);
    if(dAS<SUN_ANDROMEDA.dangerR&&dAS>1){
      const ax=(player.wx-SUN_ANDROMEDA.wx)/dAS,ay=(player.wy-SUN_ANDROMEDA.wy)/dAS;
      const force=(SUN_ANDROMEDA.dangerR-dAS)/SUN_ANDROMEDA.dangerR*30+(dAS<200?25:0);
      player.wx+=ax*force;player.wy+=ay*force;
    }
    // Andromeda near object popup
    if(!nearObj){
      for(const p of ANDROMEDA_PLANETS){
        if(dst(player.wx,player.wy,p.wx,p.wy)<p.r+200){nearObj=p;break;}
      }
    }
  }

  // Station
  const sts=w2s(STATION.wx,STATION.wy);
  const SR2=STATION.r*zoomLevel;
  if(fin(sts.x)&&fin(sts.y)&&sts.x>-80&&sts.x<canvas.width+80&&sts.y>-80&&sts.y<canvas.height+80){
    ctx.save();ctx.translate(sts.x,sts.y);ctx.rotate(frame/85);
    ctx.strokeStyle='rgba(148,163,184,0.8)';ctx.lineWidth=3.5*zoomLevel;ctx.shadowColor='#94a3b8';ctx.shadowBlur=sb(8);
    ctx.beginPath();ctx.arc(0,0,SR2,0,Math.PI*2);ctx.stroke();
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*SR2,Math.sin(a)*SR2);ctx.stroke();}
    ctx.fillStyle='rgba(125,211,252,0.9)';ctx.shadowColor='#7dd3fc';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(0,0,5*zoomLevel,0,Math.PI*2);ctx.fill();
    ctx.restore();
    if(dst(player.wx,player.wy,STATION.wx,STATION.wy)<900){ctx.fillStyle='rgba(148,163,184,0.6)';ctx.font='10px Courier New,monospace';ctx.textAlign='center';ctx.fillText('🛰️ '+STATION.name,sts.x,sts.y+STATION.r+13);}
  }

  // Asteroids
  for(const a of ASTEROIDS){
    const as=w2s(a.wx,a.wy);if(!fin(as.x)||!fin(as.y))continue;
    if(as.x<-60||as.x>canvas.width+60||as.y<-60||as.y>canvas.height+60)continue;
    const asz=a.r*zoomLevel; if(asz<1.5) continue;
    ctx.save();ctx.translate(as.x,as.y);ctx.rotate(a.rot);ctx.fillStyle=a.col;ctx.shadowBlur=0;
    ctx.beginPath();for(let i=0;i<6;i++){const ang=(i/6)*Math.PI*2,r=asz*(0.7+0.3*Math.sin(i*2.3));if(i===0)ctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r);else ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);}
    ctx.closePath();ctx.fill();ctx.restore();
  }

  // NPCs - beragam shape per type
  for(const n of NPCS){
    const ns=w2s(n.wx,n.wy);
    if(!fin(ns.x)||!fin(ns.y))continue;
    if(ns.x<-100||ns.x>canvas.width+100||ns.y<-100||ns.y>canvas.height+100)continue;
    // Trail - only draw when zoomed out
    if(zoomLevel<0.7 && n.trail.length>1){
      ctx.beginPath();
      for(let i=0;i<n.trail.length;i++){
        const ts=w2s(n.trail[i].x,n.trail[i].y);
        if(i===0)ctx.moveTo(ts.x,ts.y); else ctx.lineTo(ts.x,ts.y);
      }
      const tc=n.col.startsWith('hsl')?n.col.replace('hsl','hsla').replace(')',',0.18)'):n.col;
      ctx.strokeStyle=tc; ctx.lineWidth=1.5; ctx.stroke();
    }
    ctx.save();
    ctx.translate(ns.x,ns.y);
    ctx.rotate(n.angle+Math.PI/2);
    ctx.fillStyle=n.col; ctx.shadowColor=n.col; ctx.shadowBlur=sb(5);
    const sz=n.sz*zoomLevel;
    if(n.type==='fighter'){
      // Lancip kecil cepat
      ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*0.5,sz*0.7);ctx.lineTo(0,sz*0.3);ctx.lineTo(-sz*0.5,sz*0.7);ctx.closePath();ctx.fill();
    } else if(n.type==='cruiser'){
      // Lebih lebar, besar
      ctx.beginPath();ctx.moveTo(0,-sz*1.1);ctx.lineTo(sz*0.9,sz*0.5);ctx.lineTo(sz*0.4,sz*0.9);ctx.lineTo(0,sz*0.6);ctx.lineTo(-sz*0.4,sz*0.9);ctx.lineTo(-sz*0.9,sz*0.5);ctx.closePath();ctx.fill();
      // Accent stripe
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,-sz*0.8);ctx.lineTo(0,sz*0.4);ctx.stroke();
    } else if(n.type==='scout'){
      // Ramping tipis
      ctx.beginPath();ctx.moveTo(0,-sz*1.3);ctx.lineTo(sz*0.3,sz*0.6);ctx.lineTo(0,sz*0.2);ctx.lineTo(-sz*0.3,sz*0.6);ctx.closePath();ctx.fill();
    } else if(n.type==='freighter'){
      // Kotak besar lambat
      ctx.beginPath();ctx.moveTo(0,-sz*0.8);ctx.lineTo(sz,sz*0.4);ctx.lineTo(sz*0.7,sz*0.9);ctx.lineTo(-sz*0.7,sz*0.9);ctx.lineTo(-sz,sz*0.4);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.fillRect(-sz*0.3,-sz*0.3,sz*0.6,sz*0.6);
    } else {
      // warship - bentuk panah tebal
      ctx.beginPath();ctx.moveTo(0,-sz*1.2);ctx.lineTo(sz*0.8,sz*0.3);ctx.lineTo(sz*0.3,sz*0.1);ctx.lineTo(sz*0.3,sz*0.9);ctx.lineTo(-sz*0.3,sz*0.9);ctx.lineTo(-sz*0.3,sz*0.1);ctx.lineTo(-sz*0.8,sz*0.3);ctx.closePath();ctx.fill();
    }
    // Engine glow bawah
    ctx.shadowBlur=0;
    const eg2=zoomLevel<0.5?sRad(0,sz*0.4,0,0,sz*0.4,sz*0.6):null;
    if(eg2){eg2.addColorStop(0,n.col.replace('hsl','hsla').replace(')',',0.8)'));eg2.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=eg2;ctx.beginPath();ctx.arc(0,sz*0.4,sz*0.6,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }

  // Particles
  // Limit particles rendered when zoomed in for performance
  const maxPart = zoomLevel < 0.5 ? particles.length : Math.min(particles.length, 30);
  for(let pi=0;pi<maxPart;pi++){const p=particles[pi];const ps2=w2s(p.x,p.y);if(!fin(ps2.x)||!fin(ps2.y))continue;ctx.globalAlpha=Math.max(0,p.life/p.ml);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(ps2.x,ps2.y,p.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  // Warp streaks
  if(warpActive){
    ctx.save();
    // Warp speed lines - makin lama makin intense
    ctx.globalAlpha=0.45;
    for(let i=0;i<22;i++){
      const a=Math.random()*Math.PI*2;
      const len=80+Math.random()*250;
      const alpha=0.2+Math.random()*0.5;
      ctx.strokeStyle=`rgba(129,140,248,${alpha})`;
      ctx.lineWidth=0.8+Math.random()*1.2;
      ctx.beginPath();
      ctx.moveTo(canvas.width/2+Math.cos(a)*20,canvas.height/2+Math.sin(a)*20);
      ctx.lineTo(canvas.width/2+Math.cos(a)*(20+len),canvas.height/2+Math.sin(a)*(20+len));
      ctx.stroke();
    }
    // Blue flash center (only when zoomed out)
    if(zoomLevel < 0.5){
      ctx.globalAlpha=0.08+0.04*Math.sin(frame/3);
      const wg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,200);
      wg.addColorStop(0,'rgba(129,140,248,0.6)');
      wg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=wg;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    ctx.restore();
  }

  // Player
  ctx.save();ctx.translate(canvas.width/2,canvas.height/2);ctx.rotate(player.angle);
  drawShip(activeSkin,0,0,player.size*zoomLevel);
  ctx.restore();
  // Hard reset after ship draw - prevent any leaking effects
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
  ctx.setLineDash([]);
  ctx.lineWidth = 1;

  // crosshair removed

  drawMinimap();
  drawNpcArrows();
  drawZoneNotif();
}

function drawZoneNotif(){
  if(_zoneNotifTimer<=0||!_zoneNotifData) return;
  _zoneNotifTimer--;
  const alpha=Math.min(1,_zoneNotifTimer/30)*Math.min(1,(_zoneNotifTimer>0?1:0));
  const fadeIn=Math.min(1,(_zoneNotifTimer)/20);
  const fadeOut=_zoneNotifTimer<40?_zoneNotifTimer/40:1;
  const a=Math.min(fadeIn,fadeOut);
  const cx=canvas.width/2, cy=80;
  ctx.save();
  ctx.globalAlpha=a;
  // Background pill
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.strokeStyle=_zoneNotifData.col;
  ctx.lineWidth=1.5;
  ctx.shadowColor=_zoneNotifData.col;
  ctx.shadowBlur=15;
  const w=280,h=54,rx=14;
  ctx.beginPath();
  ctx.roundRect(cx-w/2,cy-h/2,w,h,rx);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur=0;
  // Title
  ctx.fillStyle=_zoneNotifData.col;
  ctx.font='bold 15px Courier New,monospace';
  ctx.textAlign='center';
  ctx.fillText(_zoneNotifData.title,cx,cy-6);
  // Subtitle
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.font='10px Courier New,monospace';
  ctx.fillText(_zoneNotifData.sub,cx,cy+12);
  ctx.restore();
}

function drawNpcArrows(){
  const ac=document.getElementById('npc-arrows');
  if(!ac) return;
  const actx=ac.getContext('2d');
  actx.clearRect(0,0,ac.width,ac.height);

  const cx=ac.width/2, cy=ac.height/2;
  const margin=55; // arrow distance from edge

  // Find 3 nearest NPCs
  const sorted=[...NPCS].sort((a,b)=>
    dst(player.wx,player.wy,a.wx,a.wy)-dst(player.wx,player.wy,b.wx,b.wy)
  ).slice(0,3);

  for(const n of sorted){
    // World to screen
    const sx=cx+(n.wx-camX)*zoomLevel;
    const sy=cy+(n.wy-camY)*zoomLevel;

    // If NPC is visible on screen, skip arrow
    const pad=40;
    if(sx>pad&&sx<ac.width-pad&&sy>pad&&sy<ac.height-pad) continue;

    // Direction from center to NPC
    const dx=sx-cx, dy=sy-cy;
    const angle=Math.atan2(dy,dx);
    const dist=Math.round(dst(player.wx,player.wy,n.wx,n.wy));

    // Arrow position on screen edge
    const ax=cx+Math.cos(angle)*(Math.min(cx,cy)-margin);
    const ay=cy+Math.sin(angle)*(Math.min(cx,cy)-margin);

    actx.save();
    actx.translate(ax,ay);
    actx.rotate(angle+Math.PI/2);

    // Arrow triangle
    const col=n.col||'#fb923c';
    actx.fillStyle=col;
    actx.shadowColor=col;
    actx.shadowBlur=6;
    actx.globalAlpha=0.85;
    actx.beginPath();
    actx.moveTo(0,-10);
    actx.lineTo(6,6);
    actx.lineTo(0,2);
    actx.lineTo(-6,6);
    actx.closePath();
    actx.fill();

    actx.restore();

    // Distance label
    actx.fillStyle='rgba(255,255,255,0.6)';
    actx.font='9px Courier New,monospace';
    actx.textAlign='center';
    actx.shadowBlur=0;
    // Format distance
    const label=dist>1000?`${(dist/1000).toFixed(1)}k`:dist+'';
    actx.fillText(label, ax, ay+18);
  }
}

// Standalone skin draw functions (copied from Meteor Rush)
function drawFlowerGacha(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/14);
  // Aura pink lembut
  const gr=ctx.createRadialGradient(x,y,0,x,y,size*3);
  gr.addColorStop(0,`rgba(249,168,212,${0.25+pulse*0.15})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3,0,Math.PI*2); ctx.fill();
  // Badan bunga — kelopak 6
  const petalCount=6;
  const rot=frame/50;
  for(let p=0;p<petalCount;p++){
    const a=rot+(p/petalCount)*Math.PI*2;
    const px=x+Math.cos(a)*size*0.8;
    const py=y+Math.sin(a)*size*0.8;
    ctx.fillStyle=p%2===0?`rgba(249,168,212,${0.9+pulse*0.1})`:`rgba(253,164,175,${0.8+pulse*0.1})`;
    ctx.shadowColor='#f9a8d4'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.ellipse(px,py,size*0.55,size*0.3,a,0,Math.PI*2); ctx.fill();
  }
  // Putik tengah
  ctx.fillStyle=`rgba(253,224,71,${0.95+pulse*0.05})`; ctx.shadowColor='#fde047'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(x,y,size*0.38,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(180,130,0,0.6)';
  ctx.beginPath(); ctx.arc(x,y,size*0.18,0,Math.PI*2); ctx.fill();
  // 3 kelopak orbit kecil berputar berlawanan
  const orbitRot=-frame/30;
  for(let o=0;o<3;o++){
    const oa=orbitRot+(o/3)*Math.PI*2;
    const or2=size*1.8;
    ctx.fillStyle=`rgba(252,231,243,${0.7+pulse*0.2})`; ctx.shadowColor='#fbcfe8'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(x+Math.cos(oa)*or2, y+Math.sin(oa)*or2, size*0.22, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

function drawTigerGacha(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";

  [-1,1].forEach(dx=>{

    ctx.beginPath(); ctx.ellipse(x+dx*size*0.28, y-size*0.15, size*0.14, size*0.18, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(x+dx*size*0.28, y-size*0.15, size*0.06, size*0.14, 0, 0, Math.PI*2); ctx.fill();
  });
  // Hidung & mulut
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(x, y+size*0.12, size*0.1, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=size*0.08;
  ctx.beginPath(); ctx.moveTo(x-size*0.22,y+size*0.28); ctx.quadraticCurveTo(x,y+size*0.45,x+size*0.22,y+size*0.28); ctx.stroke();
  // Kumis
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5;
  [[-1,1],[1,1]].forEach(([dx,side])=>{
    ctx.beginPath(); ctx.moveTo(x+dx*size*0.15,y+size*0.18); ctx.lineTo(x+dx*size*0.7,y+size*0.12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+dx*size*0.15,y+size*0.28); ctx.lineTo(x+dx*size*0.65,y+size*0.35); ctx.stroke();
  });
  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

function drawMeteorGacha(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/8);
  // Aura meteor panas
  const gr=ctx.createRadialGradient(x,y,0,x,y,size*3.5);
  gr.addColorStop(0,`rgba(251,146,60,${0.35+pulse*0.2})`);
  gr.addColorStop(0.4,`rgba(239,68,68,${0.2+pulse*0.1})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3.5,0,Math.PI*2); ctx.fill();
  // Badan meteor — batu berbentuk tidak rata
  ctx.fillStyle=`rgba(100,116,139,0.95)`; ctx.shadowColor='#fb923c'; ctx.shadowBlur=20;
  ctx.beginPath();
  ctx.moveTo(x,y-size*1.1);
  ctx.quadraticCurveTo(x+size*0.9,y-size*0.6,x+size*0.85,y+size*0.2);
  ctx.quadraticCurveTo(x+size*0.5,y+size*1.0,x,y+size*0.85);
  ctx.quadraticCurveTo(x-size*0.7,y+size*0.9,x-size*0.85,y+size*0.1);
  ctx.quadraticCurveTo(x-size*0.9,y-size*0.5,x,y-size*1.1);
  ctx.fill();
  // Kawah / retakan di permukaan
  ctx.strokeStyle='rgba(239,68,68,0.8)'; ctx.lineWidth=size*0.12; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x-size*0.4,y-size*0.5); ctx.lineTo(x+size*0.2,y+size*0.3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+size*0.3,y-size*0.4); ctx.lineTo(x-size*0.1,y+size*0.4); ctx.stroke();
  // Glow inti merah-oranye
  const iGr=ctx.createRadialGradient(x,y,0,x,y,size*0.6);
  iGr.addColorStop(0,`rgba(251,191,36,${0.6+pulse*0.3})`);
  iGr.addColorStop(1,'rgba(239,68,68,0)');
  ctx.fillStyle=iGr; ctx.beginPath(); ctx.arc(x,y,size*0.6,0,Math.PI*2); ctx.fill();
  // Api di belakang (ekor meteor)
  if(frame%3===0){
    for(let f=0;f<2;f++){
      const fireCol=['rgba(251,146,60,0.8)','rgba(239,68,68,0.7)','rgba(251,191,36,0.9)'][Math.floor(Math.random()*3)];
      particles.push({x:x+(Math.random()-0.5)*size*0.8,y:y+size*0.9+Math.random()*size*0.5,
        vx:(Math.random()-0.5)*1.2,vy:1.5+Math.random()*2.5,
        r:3+Math.random()*5,life:20,maxLife:20,color:fireCol});
    }
  }
  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

// ── WIND GACHA SKIN ──
function drawWindGacha(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/10);
  const gr=ctx.createRadialGradient(x,y,0,x,y,size*3);
  gr.addColorStop(0,`rgba(103,232,249,${0.3+pulse*0.15})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(103,232,249,0.92)`; ctx.shadowColor='#22d3ee'; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.ellipse(x,y,size*0.6,size*0.9,0,0,Math.PI*2); ctx.fill();
  for(let r=0;r<3;r++){
    const rot=frame/20+r*(Math.PI*2/3);
    ctx.strokeStyle=`rgba(224,254,255,${0.5+pulse*0.3})`; ctx.lineWidth=2.5; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(x,y,size*(1.1+r*0.3),rot,rot+Math.PI*1.2); ctx.stroke();
  }
  ctx.fillStyle=`rgba(255,255,255,${0.85+pulse*0.15})`; ctx.shadowColor='#a5f3fc'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.arc(x,y,size*0.22,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

// ── RED CRYSTAL SKIN ──
function drawRedCrystal(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse = 0.5+0.5*Math.sin(frame/9);

  // Aura merah menyala di sekitar
  const gr = ctx.createRadialGradient(x,y,0,x,y,size*3.0);
  gr.addColorStop(0, `rgba(239,68,68,${0.35+pulse*0.2})`);
  gr.addColorStop(0.5,`rgba(185,28,28,${0.12})`);
  gr.addColorStop(1,  'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3.0,0,Math.PI*2); ctx.fill();

  // Badan utama — kristal tengah (diamond vertikal)
  ctx.shadowColor='#ef4444'; ctx.shadowBlur=20;
  const bodyGr = ctx.createLinearGradient(x-size*0.6,y-size,x+size*0.6,y+size);
  bodyGr.addColorStop(0, `rgba(255,120,120,0.95)`);
  bodyGr.addColorStop(0.4,`rgba(239,68,68,0.98)`);
  bodyGr.addColorStop(1, `rgba(153,27,27,0.95)`);
  ctx.fillStyle = bodyGr;
  ctx.beginPath();
  ctx.moveTo(x,          y - size*1.1);   // puncak
  ctx.lineTo(x + size*0.55, y - size*0.2);
  ctx.lineTo(x + size*0.45, y + size*0.9);
  ctx.lineTo(x,          y + size*1.05);  // dasar
  ctx.lineTo(x - size*0.45, y + size*0.9);
  ctx.lineTo(x - size*0.55, y - size*0.2);
  ctx.closePath(); ctx.fill();

  // Kilap / facet terang di kiri atas
  ctx.fillStyle = `rgba(255,200,200,${0.4+pulse*0.25})`;
  ctx.beginPath();
  ctx.moveTo(x - size*0.04, y - size*1.05);
  ctx.lineTo(x + size*0.45, y - size*0.25);
  ctx.lineTo(x,             y - size*0.05);
  ctx.lineTo(x - size*0.4,  y - size*0.3);
  ctx.closePath(); ctx.fill();

  // Garis facet tengah (kesan kristal)
  ctx.strokeStyle = `rgba(255,150,150,${0.5+pulse*0.2})`;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(x, y - size*1.05);
  ctx.lineTo(x, y + size*1.0);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - size*0.55, y - size*0.2);
  ctx.lineTo(x + size*0.55, y - size*0.2);
  ctx.stroke();

  // Dua shard kecil di kiri-kanan (agak jauh, simetris)
  [[-1, 0.3], [1, 0.3]].forEach(([dir, offsetY])=>{
    const sx = x + dir * size * 1.55;
    const sy = y + size * offsetY;
    const ss = size * 0.28;
    const shardGr = ctx.createLinearGradient(sx, sy-ss, sx, sy+ss);
    shardGr.addColorStop(0, `rgba(255,120,120,0.85)`);
    shardGr.addColorStop(1, `rgba(153,27,27,0.7)`);
    ctx.fillStyle = shardGr;
    ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(sx,        sy - ss);
    ctx.lineTo(sx + ss*0.45, sy);
    ctx.lineTo(sx,        sy + ss);
    ctx.lineTo(sx - ss*0.45, sy);
    ctx.closePath(); ctx.fill();
  });

  // Core glowing di tengah
  const coreGr = ctx.createRadialGradient(x,y,0,x,y,size*0.3);
  coreGr.addColorStop(0, `rgba(255,230,230,${0.8+pulse*0.2})`);
  coreGr.addColorStop(1, `rgba(239,68,68,0)`);
  ctx.fillStyle = coreGr;
  ctx.beginPath(); ctx.arc(x, y-size*0.1, size*0.3, 0, Math.PI*2); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

// ── BLACK SKIN ──
function drawBlackSkin(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/12);
  const pulse2=0.5+0.5*Math.sin(frame/12+Math.PI);

  // Aura hitam pekat tipis di sekitar
  const gr=ctx.createRadialGradient(x,y,0,x,y,size*3.2);
  gr.addColorStop(0,`rgba(30,30,40,${0.5+pulse*0.15})`);
  gr.addColorStop(0.6,`rgba(15,15,25,0.15)`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3.2,0,Math.PI*2); ctx.fill();

  // Badan utama — segitiga ramping elegan
  ctx.shadowColor='#475569'; ctx.shadowBlur=18;
  const bodyGr=ctx.createLinearGradient(x,y-size*1.1,x,y+size);
  bodyGr.addColorStop(0,'rgba(100,116,139,0.95)');   // slate-400 ujung atas
  bodyGr.addColorStop(0.35,'rgba(51,65,85,0.98)');   // slate-700 tengah
  bodyGr.addColorStop(1,'rgba(15,23,42,0.98)');       // slate-900 bawah
  ctx.fillStyle=bodyGr;
  ctx.beginPath();
  ctx.moveTo(x, y-size*1.15);                        // puncak
  ctx.lineTo(x+size*0.65, y+size*0.55);
  ctx.lineTo(x+size*0.25, y+size*0.9);
  ctx.lineTo(x, y+size*0.7);
  ctx.lineTo(x-size*0.25, y+size*0.9);
  ctx.lineTo(x-size*0.65, y+size*0.55);
  ctx.closePath(); ctx.fill();

  // Garis accent tipis di tengah (kesan keren)
  ctx.strokeStyle=`rgba(148,163,184,${0.35+pulse*0.25})`; // slate-300
  ctx.lineWidth=1.2; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.moveTo(x,y-size*1.0); ctx.lineTo(x,y+size*0.65); ctx.stroke();

  // 2 sayap kecil di samping
  [-1,1].forEach(dir=>{
    const wx=x+dir*size*0.55, wy=y+size*0.1;
    ctx.fillStyle=`rgba(51,65,85,${0.85+pulse2*0.1})`;
    ctx.shadowBlur=8; ctx.shadowColor='#334155';
    ctx.beginPath();
    ctx.moveTo(wx, wy);
    ctx.lineTo(wx+dir*size*0.5, wy+size*0.4);
    ctx.lineTo(wx+dir*size*0.1, wy+size*0.5);
    ctx.closePath(); ctx.fill();
    // Garis accent sayap
    ctx.strokeStyle=`rgba(100,116,139,${0.3+pulse*0.2})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx+dir*size*0.5,wy+size*0.4); ctx.stroke();
  });

  // Core — titik cahaya biru baja di tengah
  const coreGr=ctx.createRadialGradient(x,y-size*0.1,0,x,y-size*0.1,size*0.28);
  coreGr.addColorStop(0,`rgba(186,230,253,${0.7+pulse*0.3})`); // sky-200
  coreGr.addColorStop(1,'rgba(51,65,85,0)');
  ctx.fillStyle=coreGr; ctx.shadowColor='#7dd3fc'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(x,y-size*0.1,size*0.28,0,Math.PI*2); ctx.fill();

  // Ring tipis elegan berputar
  ctx.strokeStyle=`rgba(100,116,139,${0.2+pulse*0.15})`; ctx.lineWidth=1;
  ctx.shadowColor='#475569'; ctx.shadowBlur=5;
  const rot=frame/45;
  ctx.beginPath(); ctx.arc(x,y,size*1.5,rot,rot+Math.PI*1.3); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,size*1.8,rot+Math.PI,rot+Math.PI*2.3); ctx.stroke();

  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

// ── VOID DUAL SKIN ──
function drawVoidDual(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/10);
  const pulse2=0.5+0.5*Math.sin(frame/10+Math.PI);
  // Aura void ungu hitam
  const gr=ctx.createRadialGradient(x,y,0,x,y,size*3.5);
  gr.addColorStop(0,`rgba(124,58,237,${0.45+pulse*0.2})`);
  gr.addColorStop(0.5,`rgba(76,29,149,${0.15})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3.5,0,Math.PI*2); ctx.fill();
  // Ring kehampaan berputar
  for(let r=0;r<3;r++){
    const rot=frame/18+r*(Math.PI*2/3);
    ctx.strokeStyle=`rgba(167,139,250,${0.3+pulse*0.3})`; ctx.lineWidth=1.5; ctx.shadowColor='#7c3aed'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(x,y,size*(1.2+r*0.35),rot,rot+Math.PI*1.1); ctx.stroke();
  }
  // Badan utama — segitiga void
  ctx.shadowColor='#7c3aed'; ctx.shadowBlur=25;
  const bg=ctx.createLinearGradient(x,y-size,x,y+size);
  bg.addColorStop(0,'rgba(167,139,250,0.95)');
  bg.addColorStop(0.4,'rgba(124,58,237,0.98)');
  bg.addColorStop(1,'rgba(46,16,101,0.95)');
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.moveTo(x, y-size*1.1);
  ctx.lineTo(x+size*0.75, y+size*0.85);
  ctx.lineTo(x, y+size*0.5);
  ctx.lineTo(x-size*0.75, y+size*0.85);
  ctx.closePath(); ctx.fill();
  // Inti void berkedip
  const coreGr=ctx.createRadialGradient(x,y,0,x,y,size*0.45);
  coreGr.addColorStop(0,`rgba(0,0,0,${0.9+pulse2*0.1})`);
  coreGr.addColorStop(0.6,`rgba(124,58,237,${0.5+pulse*0.3})`);
  coreGr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=coreGr; ctx.beginPath(); ctx.arc(x,y,size*0.45,0,Math.PI*2); ctx.fill();
  // Partikel void melayang
  for(let p=0;p<5;p++){
    const pa=(p/5)*Math.PI*2+frame/30;
    const pr=size*(1.5+0.3*Math.sin(frame/15+p));
    ctx.fillStyle=`rgba(167,139,250,${0.4+0.4*pulse})`; ctx.shadowColor='#a78bfa'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(x+Math.cos(pa)*pr, y+Math.sin(pa)*pr, size*0.1, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

// ── LIFE DUAL SKIN ──
function drawLifeDual(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/10);
  // Aura hijau kehidupan
  const gr=ctx.createRadialGradient(x,y,0,x,y,size*3.5);
  gr.addColorStop(0,`rgba(34,197,94,${0.4+pulse*0.18})`);
  gr.addColorStop(0.5,`rgba(21,128,61,${0.12})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3.5,0,Math.PI*2); ctx.fill();
  // Badan utama — leaf shape
  ctx.shadowColor='#22c55e'; ctx.shadowBlur=22;
  const bg=ctx.createLinearGradient(x,y-size,x,y+size);
  bg.addColorStop(0,'rgba(134,239,172,0.95)');
  bg.addColorStop(0.4,'rgba(34,197,94,0.98)');
  bg.addColorStop(1,'rgba(20,83,45,0.95)');
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.moveTo(x, y-size*1.15);
  ctx.bezierCurveTo(x+size*0.9, y-size*0.3, x+size*0.7, y+size*0.6, x, y+size*1.0);
  ctx.bezierCurveTo(x-size*0.7, y+size*0.6, x-size*0.9, y-size*0.3, x, y-size*1.15);
  ctx.closePath(); ctx.fill();
  // Urat daun tengah
  ctx.strokeStyle=`rgba(220,252,231,${0.6+pulse*0.3})`; ctx.lineWidth=1.8; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.moveTo(x, y-size*1.0); ctx.lineTo(x, y+size*0.9); ctx.stroke();
  // Urat samping
  for(let v=0;v<3;v++){
    const vy=y-size*0.5+v*size*0.5;
    ctx.beginPath(); ctx.moveTo(x, vy); ctx.lineTo(x+size*0.5, vy-size*0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, vy); ctx.lineTo(x-size*0.5, vy-size*0.1); ctx.stroke();
  }
  // Partikel daun kecil melayang
  for(let p=0;p<5;p++){
    const pa=(p/5)*Math.PI*2+frame/35;
    const pr=size*(1.6+0.25*Math.sin(frame/12+p));
    ctx.fillStyle=`rgba(134,239,172,${0.4+0.35*pulse})`; ctx.shadowColor='#86efac'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(x+Math.cos(pa)*pr, y+Math.sin(pa)*pr, size*0.1, 0, Math.PI*2); ctx.fill();
  }
  // Inti kehidupan berpendar
  const coreGr=ctx.createRadialGradient(x,y,0,x,y,size*0.3);
  coreGr.addColorStop(0,`rgba(255,255,255,${0.8+pulse*0.2})`);
  coreGr.addColorStop(1,'rgba(34,197,94,0)');
  ctx.fillStyle=coreGr; ctx.beginPath(); ctx.arc(x,y-size*0.1,size*0.3,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

// ── GOLD GACHA SKIN ──
function drawGoldGacha(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/9);
  const gr=ctx.createRadialGradient(x,y,0,x,y,size*3.2);
  gr.addColorStop(0,`rgba(253,224,71,${0.35+pulse*0.2})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(253,224,71,0.95)'; ctx.shadowColor='#fbbf24'; ctx.shadowBlur=20;
  ctx.beginPath();
  ctx.moveTo(x,y-size*1.0); ctx.lineTo(x+size*0.7,y);
  ctx.lineTo(x,y+size*1.0); ctx.lineTo(x-size*0.7,y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=`rgba(255,255,200,${0.6+pulse*0.2})`;
  ctx.beginPath();
  ctx.moveTo(x,y-size*1.0); ctx.lineTo(x+size*0.35,y-size*0.25);
  ctx.lineTo(x,y-size*0.1); ctx.lineTo(x-size*0.35,y-size*0.25);
  ctx.closePath(); ctx.fill();
  for(let s=0;s<4;s++){
    const sa=frame/25+(s/4)*Math.PI*2;
    ctx.fillStyle=`rgba(253,224,71,${0.7+pulse*0.3})`; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(x+Math.cos(sa)*size*1.6,y+Math.sin(sa)*size*1.6,size*0.12,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.restore();
}

// ── SUPER LIVES GACHA SKIN ──
function drawSuperLivesGacha(x,y,size){
  ctx.save();
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.setLineDash([]); ctx.globalCompositeOperation="source-over";
  const pulse=0.5+0.5*Math.sin(frame/12);
  const gr=ctx.createRadialGradient(x,y,0,x,y,size*3.5);
  gr.addColorStop(0,`rgba(74,222,128,${0.3+pulse*0.18})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,size*3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(34,197,94,0.95)'; ctx.shadowColor='#4ade80'; ctx.shadowBlur=18;
  ctx.beginPath();
  ctx.moveTo(x,y-size*1.1);
  ctx.quadraticCurveTo(x+size*0.8,y-size*0.2,x+size*0.7,y+size*0.8);
  ctx.lineTo(x-size*0.7,y+size*0.8);
  ctx.quadraticCurveTo(x-size*0.8,y-size*0.2,x,y-size*1.1);
  ctx.fill();
  // 5 hati
  const hPos=[[-0.55,0.3],[-0.28,0.55],[0,0.65],[0.28,0.55],[0.55,0.3]];
  hPos.forEach(([hx,hy])=>{
    const hpx=x+hx*size,hpy=y+hy*size;
    ctx.fillStyle=`rgba(255,100,130,${0.9+pulse*0.1})`; ctx.shadowColor='#f43f5e'; ctx.shadowBlur=6;
    ctx.beginPath();
    ctx.moveTo(hpx,hpy+size*0.12);
    ctx.bezierCurveTo(hpx,hpy-size*0.06,hpx-size*0.15,hpy-size*0.12,hpx-size*0.15,hpy);
    ctx.bezierCurveTo(hpx-size*0.15,hpy+size*0.08,hpx,hpy+size*0.14,hpx,hpy+size*0.22);
    ctx.bezierCurveTo(hpx,hpy+size*0.14,hpx+size*0.15,hpy+size*0.08,hpx+size*0.15,hpy);
